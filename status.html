<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SYSTEM STATUS — TETRIS BATTLE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg:       #04060f;
    --s0:       #080d18;
    --s1:       #0d1525;
    --border:   #1a2540;
    --acc:      #00f5ff;
    --acc2:     #ff0080;
    --acc3:     #aaff00;
    --warn:     #ffaa00;
    --red:      #ff3355;
    --tx:       #e0f0ff;
    --dim:      #4a6080;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--tx);
    font-family: 'Orbitron', monospace;
    min-height: 100vh;
  }

  /* ── SCANLINES ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: repeating-linear-gradient(0deg,
      transparent, transparent 2px,
      rgba(0,0,0,.14) 2px, rgba(0,0,0,.14) 4px);
  }

  /* ── SCAN BEAM ── */
  body::after {
    content: '';
    position: fixed; left: 0; right: 0; height: 120px; z-index: 0; pointer-events: none;
    background: linear-gradient(180deg,
      transparent,
      rgba(0,245,255,.04) 40%,
      rgba(0,245,255,.07) 50%,
      rgba(0,245,255,.04) 60%,
      transparent);
    animation: scanBeam 8s linear infinite;
  }
  @keyframes scanBeam { 0%{ top:-120px } 100%{ top:100vh } }

  /* ── LAYOUT ── */
  .page {
    position: relative; z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  /* ── HEADER ── */
  .header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    margin-bottom: 36px;
  }
  .logo-wrap { display: flex; flex-direction: column; gap: 6px; }
  .logo-sub {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--acc2);
    letter-spacing: 3px;
    text-shadow: 0 0 12px rgba(255,0,128,.6);
  }
  .logo {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(16px, 3.5vw, 26px);
    color: var(--acc);
    letter-spacing: 5px;
    text-shadow: 0 0 10px rgba(0,245,255,.8), 0 0 40px rgba(0,245,255,.3);
    animation: logoFlicker 6s ease-in-out infinite;
  }
  @keyframes logoFlicker {
    0%,92%,100%{ opacity:1 }
    93%{ opacity:.75 }
    95%{ opacity:1 }
    97%{ opacity:.85 }
  }

  /* ── OVERALL BADGE ── */
  .overall-badge {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 18px;
    border-radius: 3px;
    border: 2px solid;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    transition: all .3s;
  }
  .overall-badge.ok    { border-color: var(--acc3); color: var(--acc3); background: rgba(170,255,0,.07); box-shadow: 0 0 20px rgba(170,255,0,.2); }
  .overall-badge.warn  { border-color: var(--warn);  color: var(--warn);  background: rgba(255,170,0,.07); box-shadow: 0 0 20px rgba(255,170,0,.2); }
  .overall-badge.error { border-color: var(--red);   color: var(--red);   background: rgba(255,51,85,.07); box-shadow: 0 0 20px rgba(255,51,85,.2); }
  .overall-badge.checking { border-color: var(--dim); color: var(--dim); background: transparent; }

  .badge-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .overall-badge.ok    .badge-dot { background: var(--acc3); box-shadow: 0 0 8px var(--acc3); animation: dotPulse 1.8s ease-in-out infinite; }
  .overall-badge.warn  .badge-dot { background: var(--warn);  box-shadow: 0 0 8px var(--warn);  animation: dotPulse 1s ease-in-out infinite; }
  .overall-badge.error .badge-dot { background: var(--red);   box-shadow: 0 0 8px var(--red);   animation: dotPulse .6s ease-in-out infinite; }
  .overall-badge.checking .badge-dot { background: var(--dim); animation: dotSpin .8s linear infinite; }
  @keyframes dotPulse { 0%,100%{ transform:scale(1); opacity:1 } 50%{ transform:scale(1.4); opacity:.6 } }
  @keyframes dotSpin  { 0%{ box-shadow: 2px 0 0 var(--dim) } 25%{ box-shadow: 0 2px 0 var(--dim) } 50%{ box-shadow: -2px 0 0 var(--dim) } 75%{ box-shadow: 0 -2px 0 var(--dim) } }

  /* ── LAST UPDATED ── */
  .last-updated {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    margin-bottom: 28px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    padding: 3px 10px;
    border-radius: 2px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all .2s;
  }
  .refresh-btn:hover { border-color: var(--acc); color: var(--acc); }
  .refresh-btn:active { transform: scale(.95); }
  .refresh-btn.spinning { animation: btnSpin .6s linear infinite; }
  @keyframes btnSpin { from{ opacity:1 } 50%{ opacity:.4 } to{ opacity:1 } }

  /* ── SECTION ── */
  .section { margin-bottom: 32px; }
  .section-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 3px;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::before {
    content: '';
    display: inline-block;
    width: 3px; height: 12px;
    background: var(--acc);
    box-shadow: 0 0 6px var(--acc);
    flex-shrink: 0;
  }

  /* ── SERVICE CARD ── */
  .services { display: flex; flex-direction: column; gap: 8px; }

  .svc {
    display: grid;
    grid-template-columns: 36px 1fr auto auto;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--s0);
    border: 1px solid var(--border);
    border-radius: 3px;
    position: relative;
    overflow: hidden;
    transition: border-color .3s;
  }
  .svc::before {
    content: '';
    position: absolute; top: 0; left: 0; bottom: 0;
    width: 3px;
    background: var(--border);
    transition: background .3s, box-shadow .3s;
  }
  .svc.ok::before    { background: var(--acc3); box-shadow: 0 0 8px var(--acc3); }
  .svc.warn::before  { background: var(--warn);  box-shadow: 0 0 8px var(--warn); }
  .svc.error::before { background: var(--red);   box-shadow: 0 0 8px var(--red); }
  .svc.ok    { border-color: rgba(170,255,0,.2); }
  .svc.warn  { border-color: rgba(255,170,0,.2); }
  .svc.error { border-color: rgba(255,51,85,.2); }

  /* icon */
  .svc-icon {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 6px;
    background: var(--s1);
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* info */
  .svc-info { min-width: 0; }
  .svc-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--tx);
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .svc-desc {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: .5px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .svc-detail {
    font-size: 10px;
    color: var(--dim);
    margin-top: 3px;
    letter-spacing: .5px;
    transition: color .3s;
  }
  .svc.ok    .svc-detail { color: rgba(170,255,0,.7); }
  .svc.warn  .svc-detail { color: rgba(255,170,0,.7); }
  .svc.error .svc-detail { color: rgba(255,51,85,.7); }

  /* latency */
  .svc-latency {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 1px;
    text-align: right;
    flex-shrink: 0;
    min-width: 60px;
  }
  .svc.ok    .svc-latency { color: var(--acc3); }
  .svc.warn  .svc-latency { color: var(--warn); }
  .svc.error .svc-latency { color: var(--red); }

  /* status pill */
  .svc-status {
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    padding: 4px 8px;
    border-radius: 2px;
    letter-spacing: 1px;
    border: 1px solid;
    flex-shrink: 0;
    min-width: 72px;
    text-align: center;
    transition: all .3s;
  }
  .svc-status.ok      { border-color: var(--acc3); color: var(--acc3); background: rgba(170,255,0,.06); }
  .svc-status.warn    { border-color: var(--warn);  color: var(--warn);  background: rgba(255,170,0,.06); }
  .svc-status.error   { border-color: var(--red);   color: var(--red);   background: rgba(255,51,85,.06); }
  .svc-status.checking{ border-color: var(--dim);   color: var(--dim);   background: transparent; animation: blink 1s step-end infinite; }
  @keyframes blink { 0%,100%{ opacity:1 } 50%{ opacity:.3 } }

  @media(max-width:560px) {
    .svc { grid-template-columns: 28px 1fr auto; gap: 10px; }
    .svc-latency { display: none; }
    .svc-icon { width: 28px; height: 28px; }
  }

  /* ── UPTIME BAR ── */
  .uptime-section { margin-top: 6px; }
  .uptime-label {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .uptime-bars {
    display: flex;
    gap: 2px;
    align-items: flex-end;
    height: 30px;
  }
  .uptime-bar {
    flex: 1;
    border-radius: 1px;
    background: var(--s1);
    transition: background .2s, height .3s;
    cursor: default;
    position: relative;
  }
  .uptime-bar.ok    { background: rgba(170,255,0,.5); }
  .uptime-bar.warn  { background: rgba(255,170,0,.6); }
  .uptime-bar.error { background: rgba(255,51,85,.7); }
  .uptime-bar:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    background: var(--s0);
    border: 1px solid var(--border);
    color: var(--tx);
    font-size: 9px;
    padding: 3px 7px;
    border-radius: 2px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
  }

  /* ── INFO CARDS ── */
  .info-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
    margin-bottom: 32px;
  }
  .info-card {
    background: var(--s0);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 14px 16px;
    position: relative;
    overflow: hidden;
  }
  .info-card::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--acc), var(--acc2));
    opacity: .5;
  }
  .info-card-label {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .info-card-val {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--acc);
    letter-spacing: 2px;
  }
  .info-card-val.green { color: var(--acc3); }
  .info-card-val.pink  { color: var(--acc2); }

  /* ── FOOTER ── */
  .footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--s0);
    border-top: 1px solid var(--border);
    padding: 6px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 1px;
    z-index: 10;
  }
  .footer a {
    color: var(--dim);
    text-decoration: none;
    transition: color .2s;
  }
  .footer a:hover { color: var(--acc); }

  /* ── NOTICE BANNER ── */
  .notice {
    display: none;
    background: rgba(255,170,0,.08);
    border: 1px solid rgba(255,170,0,.35);
    border-radius: 3px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 11px;
    color: var(--warn);
    letter-spacing: .5px;
    line-height: 1.7;
    animation: noticeIn .3s ease;
  }
  .notice.show { display: block; }
  @keyframes noticeIn { from{ opacity:0; transform:translateY(-6px) } to{ opacity:1; transform:none } }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-wrap">
      <div class="logo-sub">▶ SYSTEM MONITOR</div>
      <div class="logo">STATUS</div>
    </div>
    <div class="overall-badge checking" id="overallBadge">
      <div class="badge-dot"></div>
      <span id="overallText">CHECKING...</span>
    </div>
  </div>

  <!-- LAST UPDATED -->
  <div class="last-updated">
    <span id="lastUpdated">—</span>
    <button class="refresh-btn" id="refreshBtn" onclick="runChecks()">↺ 再チェック</button>
  </div>

  <!-- NOTICE -->
  <div class="notice" id="noticeBanner" id="noticeBanner"></div>

  <!-- INFO GRID -->
  <div class="info-grid">
    <div class="info-card">
      <div class="info-card-label">APP VERSION</div>
      <div class="info-card-val pink" id="infoVersion">---</div>
    </div>
    <div class="info-card">
      <div class="info-card-label">SERVICES</div>
      <div class="info-card-val green" id="infoServices">—/—</div>
    </div>
    <div class="info-card">
      <div class="info-card-label">LAST CHECK</div>
      <div class="info-card-val" id="infoTime">—</div>
    </div>
    <div class="info-card">
      <div class="info-card-label">RESPONSE AVG</div>
      <div class="info-card-val green" id="infoAvgMs">— ms</div>
    </div>
  </div>

  <!-- CORE SERVICES -->
  <div class="section">
    <div class="section-title">CORE SERVICES</div>
    <div class="services" id="coreServices"></div>
  </div>

  <!-- EXTERNAL APIs -->
  <div class="section">
    <div class="section-title">EXTERNAL APIs</div>
    <div class="services" id="externalServices"></div>
  </div>

  <!-- UPTIME (SIMULATED HISTORY) -->
  <div class="section uptime-section">
    <div class="section-title">CHECK HISTORY（直近 30 回）</div>
    <div class="uptime-label" id="uptimeLabel">LOADING...</div>
    <div class="uptime-bars" id="uptimeBars"></div>
  </div>

</div>

<!-- FOOTER -->
<div class="footer">
  <span>TETRIS BATTLE ONLINE — SYSTEM STATUS</span>
  <a href="index.html">← メニューに戻る</a>
</div>

<script type="module">
import { APP_VERSION } from './config.js';
document.getElementById('infoVersion').textContent = APP_VERSION;

// ══════════════════════════════════════════════════════════
// CHECK HISTORY (sessionStorage)
// ══════════════════════════════════════════════════════════
const HISTORY_KEY = 'status_history';
const MAX_HISTORY = 30;

function loadHistory() {
  try { return JSON.parse(sessionStorage.getItem(HISTORY_KEY) || '[]'); }
  catch { return []; }
}
function saveHistory(arr) {
  try { sessionStorage.setItem(HISTORY_KEY, JSON.stringify(arr.slice(-MAX_HISTORY))); }
  catch {}
}

// ══════════════════════════════════════════════════════════
// SERVICE DEFINITIONS
// ══════════════════════════════════════════════════════════
const FB_CONFIG = {
  apiKey:    "AIzaSyCjYKsc8eT9gDXEMQsfI0ZJ7UeuLwrDTxw",
  databaseURL: "https://tetris-online-9c827-default-rtdb.firebaseio.com",
  projectId: "tetris-online-9c827",
};

const CORE_SERVICES = [
  {
    id: 'firebase-rtdb',
    name: 'FIREBASE RTDB',
    desc: 'リアルタイム対戦 / プレイリスト同期',
    icon: `<svg width="20" height="20" viewBox="0 0 20 20" fill="#ff9800"><path d="M3 17L6.5 3l4.5 8.5L14.5 7 17 17H3z" opacity=".7"/><path d="M6.5 3L11 11.5 8.5 13 6.5 3z"/></svg>`,
    check: checkFirebaseRTDB,
  },
  {
    id: 'firebase-firestore',
    name: 'FIREBASE FIRESTORE',
    desc: 'サイトログ / 管理コンソール',
    icon: `<svg width="20" height="20" viewBox="0 0 20 20" fill="#ff9800"><rect x="3" y="3" width="14" height="4" rx="1" opacity=".5"/><rect x="3" y="9" width="14" height="4" rx="1" opacity=".75"/><rect x="3" y="15" width="14" height="2" rx="1"/></svg>`,
    check: checkFirebaseFirestore,
  },
  {
    id: 'google-fonts',
    name: 'GOOGLE FONTS',
    desc: 'UI フォント（Orbitron / Press Start 2P）',
    icon: `<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#4285f4" stroke-width="1.6"><circle cx="10" cy="10" r="7"/><path d="M10 3v14M3 10h14"/></svg>`,
    check: checkGoogleFonts,
  },
];

const EXTERNAL_SERVICES = [
  {
    id: 'youtube-iframe',
    name: 'YOUTUBE IFRAME API',
    desc: 'BGM プレーヤー（shell.html）',
    icon: `<svg width="20" height="20" viewBox="0 0 20 20" fill="#ff0000"><rect x="1" y="5" width="18" height="10" rx="3"/><polygon points="8,8 8,12 13,10" fill="white"/></svg>`,
    check: checkYouTubeIframe,
  },
  {
    id: 'youtube-api',
    name: 'YOUTUBE DATA API',
    desc: '楽曲検索機能',
    icon: `<svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#ff0000" stroke-width="1.6"><circle cx="8.5" cy="8.5" r="5.5"/><line x1="12.5" y1="12.5" x2="17" y2="17"/></svg>`,
    check: checkYouTubeDataAPI,
  },
];

// ══════════════════════════════════════════════════════════
// INDIVIDUAL CHECKS
// ══════════════════════════════════════════════════════════

// Firebase RTDB — ping .info/connected via REST
async function checkFirebaseRTDB() {
  const t0 = performance.now();
  try {
    const res = await fetchWithTimeout(
      `${FB_CONFIG.databaseURL}/.json?timeout=5s&shallow=true`, 5000
    );
    const ms = Math.round(performance.now() - t0);
    if (res.ok || res.status === 401 || res.status === 403) {
      // 401/403 = DB exists but rules deny anonymous read → service is UP
      return { status: 'ok', ms, detail: 'データベース接続 正常' };
    }
    return { status: 'error', ms, detail: `HTTP ${res.status}` };
  } catch(e) {
    return { status: 'error', ms: null, detail: e.message?.slice(0,40) || 'タイムアウト' };
  }
}

// Firebase Firestore — REST endpoint probe
async function checkFirebaseFirestore() {
  const t0 = performance.now();
  try {
    const url = `https://firestore.googleapis.com/v1/projects/${FB_CONFIG.projectId}/databases/(default)/documents?pageSize=1&key=${FB_CONFIG.apiKey}`;
    const res = await fetchWithTimeout(url, 6000);
    const ms = Math.round(performance.now() - t0);
    if (res.ok || res.status === 403 || res.status === 401) {
      return { status: 'ok', ms, detail: 'Firestore エンドポイント 正常' };
    }
    return { status: 'error', ms, detail: `HTTP ${res.status}` };
  } catch(e) {
    return { status: 'error', ms: null, detail: e.message?.slice(0,40) || 'タイムアウト' };
  }
}

// Google Fonts — fetch CSS
async function checkGoogleFonts() {
  const t0 = performance.now();
  try {
    const res = await fetchWithTimeout(
      'https://fonts.googleapis.com/css2?family=Orbitron:wght@400&display=swap', 5000
    );
    const ms = Math.round(performance.now() - t0);
    if (res.ok) return { status: 'ok', ms, detail: 'フォント配信 正常' };
    return { status: 'warn', ms, detail: `HTTP ${res.status}` };
  } catch(e) {
    return { status: 'error', ms: null, detail: 'フォントサーバー到達不可' };
  }
}

// YouTube Iframe API — check script availability
async function checkYouTubeIframe() {
  const t0 = performance.now();
  try {
    const res = await fetchWithTimeout('https://www.youtube.com/iframe_api', 6000);
    const ms = Math.round(performance.now() - t0);
    if (res.ok) return { status: 'ok', ms, detail: 'IFrame API スクリプト 正常' };
    return { status: 'warn', ms, detail: `HTTP ${res.status}` };
  } catch(e) {
    return { status: 'error', ms: null, detail: 'YouTube 到達不可' };
  }
}

// YouTube Data API — test search endpoint (no key needed for /videos)
async function checkYouTubeDataAPI() {
  const t0 = performance.now();
  try {
    // Hit the API without a valid key — a 400 Bad Request still means the endpoint is UP
    const res = await fetchWithTimeout(
      'https://www.googleapis.com/youtube/v3/videos?part=id&id=dQw4w9WgXcQ&key=PROBE', 6000
    );
    const ms = Math.round(performance.now() - t0);
    // 400 = bad key (expected), meaning API is reachable
    if (res.ok || res.status === 400 || res.status === 403) {
      return { status: 'ok', ms, detail: 'Data API エンドポイント 到達可能' };
    }
    if (res.status === 503 || res.status === 500) {
      return { status: 'error', ms, detail: `サーバーエラー HTTP ${res.status}` };
    }
    return { status: 'warn', ms, detail: `HTTP ${res.status}` };
  } catch(e) {
    return { status: 'error', ms: null, detail: 'Google API 到達不可' };
  }
}

// ── Timeout wrapper ──
function fetchWithTimeout(url, ms) {
  return Promise.race([
    fetch(url, { mode: 'cors', cache: 'no-store' }),
    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), ms))
  ]);
}

// ══════════════════════════════════════════════════════════
// RENDER HELPERS
// ══════════════════════════════════════════════════════════
function statusLabel(s) {
  if (s === 'ok')       return 'ONLINE';
  if (s === 'warn')     return 'DEGRADED';
  if (s === 'error')    return 'OFFLINE';
  return 'CHECKING';
}

function renderService(svc, containerId) {
  const container = document.getElementById(containerId);
  const existing  = document.getElementById('svc-' + svc.id);
  const el = existing || document.createElement('div');
  el.id        = 'svc-' + svc.id;
  el.className = `svc checking`;
  el.innerHTML = `
    <div class="svc-icon">${svc.icon}</div>
    <div class="svc-info">
      <div class="svc-name">${svc.name}</div>
      <div class="svc-desc">${svc.desc}</div>
      <div class="svc-detail" id="svc-detail-${svc.id}">確認中...</div>
    </div>
    <div class="svc-latency" id="svc-latency-${svc.id}">—</div>
    <div class="svc-status checking" id="svc-status-${svc.id}">CHECKING</div>
  `;
  if (!existing) container.appendChild(el);
}

function updateService(svc, result) {
  const el      = document.getElementById('svc-' + svc.id);
  const status  = document.getElementById('svc-status-'  + svc.id);
  const latency = document.getElementById('svc-latency-' + svc.id);
  const detail  = document.getElementById('svc-detail-'  + svc.id);
  if (!el) return;

  el.className     = `svc ${result.status}`;
  status.className = `svc-status ${result.status}`;
  status.textContent = statusLabel(result.status);
  latency.textContent = result.ms !== null ? `${result.ms} ms` : '— ms';
  detail.textContent  = result.detail || '';
}

// ══════════════════════════════════════════════════════════
// UPTIME BARS
// ══════════════════════════════════════════════════════════
function renderUptimeBars(history) {
  const container = document.getElementById('uptimeBars');
  const label     = document.getElementById('uptimeLabel');
  container.innerHTML = '';

  if (history.length === 0) {
    label.textContent = 'データなし（初回チェック実行後に記録されます）';
    for (let i = 0; i < MAX_HISTORY; i++) {
      const b = document.createElement('div');
      b.className = 'uptime-bar';
      b.style.height = '14px';
      b.setAttribute('data-tip', '未計測');
      container.appendChild(b);
    }
    return;
  }

  const okCount = history.filter(h => h.overall === 'ok').length;
  const pct     = Math.round((okCount / history.length) * 100);
  label.textContent = `稼働率 ${pct}%  （直近 ${history.length} 回 / 正常 ${okCount} 回）`;

  // pad left with empty slots
  const padded = [...Array(MAX_HISTORY - history.length).fill(null), ...history];
  padded.forEach((h, i) => {
    const b = document.createElement('div');
    b.className = 'uptime-bar ' + (h ? h.overall : '');
    const height = h
      ? (h.overall === 'ok' ? 30 : h.overall === 'warn' ? 20 : 12)
      : 14;
    b.style.height = height + 'px';
    const tip = h
      ? `${h.time}  ${statusLabel(h.overall)}  avg ${h.avgMs ?? '?'}ms`
      : '未計測';
    b.setAttribute('data-tip', tip);
    container.appendChild(b);
  });
}

// ══════════════════════════════════════════════════════════
// MAIN CHECK RUNNER
// ══════════════════════════════════════════════════════════
let isRunning = false;

window.runChecks = async function() {
  if (isRunning) return;
  isRunning = true;

  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  btn.disabled = true;

  const badge = document.getElementById('overallBadge');
  const badgeText = document.getElementById('overallText');
  badge.className  = 'overall-badge checking';
  badgeText.textContent = 'CHECKING...';

  // Init cards
  CORE_SERVICES.forEach(s => renderService(s, 'coreServices'));
  EXTERNAL_SERVICES.forEach(s => renderService(s, 'externalServices'));

  // Run all checks in parallel
  const allSvcs = [...CORE_SERVICES, ...EXTERNAL_SERVICES];
  const results = await Promise.all(
    allSvcs.map(s => s.check().catch(e => ({ status:'error', ms:null, detail:e.message })))
  );

  results.forEach((r, i) => updateService(allSvcs[i], r));

  // ── Aggregate ──
  const statuses = results.map(r => r.status);
  const errorCount = statuses.filter(s => s === 'error').length;
  const warnCount  = statuses.filter(s => s === 'warn').length;
  const okCount    = statuses.filter(s => s === 'ok').length;
  const overall    = errorCount > 0 ? 'error' : warnCount > 0 ? 'warn' : 'ok';
  const overallLabels = { ok: 'ALL SYSTEMS GO', warn: 'PARTIAL OUTAGE', error: 'SERVICE DOWN' };

  badge.className = `overall-badge ${overall}`;
  badgeText.textContent = overallLabels[overall];

  // ── Latency avg ──
  const validMs = results.map(r => r.ms).filter(ms => ms !== null);
  const avgMs   = validMs.length ? Math.round(validMs.reduce((a,b) => a+b, 0) / validMs.length) : null;

  // ── Info grid ──
  document.getElementById('infoServices').textContent = `${okCount}/${allSvcs.length}`;
  document.getElementById('infoAvgMs').textContent    = avgMs !== null ? `${avgMs} ms` : '— ms';

  const now = new Date();
  const timeStr = now.toLocaleTimeString('ja-JP', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  document.getElementById('infoTime').textContent     = timeStr;
  document.getElementById('lastUpdated').textContent  = `最終確認: ${now.toLocaleDateString('ja-JP')} ${timeStr}`;

  // ── Notice banner ──
  const notice = document.getElementById('noticeBanner');
  if (overall !== 'ok') {
    const msgs = results
      .map((r, i) => r.status !== 'ok' ? `${allSvcs[i].name}: ${r.detail}` : null)
      .filter(Boolean);
    notice.innerHTML = '⚠ ' + msgs.join('<br>⚠ ');
    notice.classList.add('show');
  } else {
    notice.classList.remove('show');
  }

  // ── History ──
  const history = loadHistory();
  history.push({ time: timeStr, overall, avgMs });
  saveHistory(history);
  renderUptimeBars(history);

  btn.classList.remove('spinning');
  btn.disabled = false;
  isRunning = false;
};

// ── Auto-refresh every 60 seconds ──
let autoTimer = null;
function startAutoRefresh() {
  clearInterval(autoTimer);
  autoTimer = setInterval(() => {
    if (!document.hidden) runChecks();
  }, 60_000);
}

// ── Init ──
// Render skeletons first
CORE_SERVICES.forEach(s => renderService(s, 'coreServices'));
EXTERNAL_SERVICES.forEach(s => renderService(s, 'externalServices'));
renderUptimeBars(loadHistory());

runChecks();
startAutoRefresh();
document.addEventListener('visibilitychange', () => {
  if (!document.hidden) runChecks();
});
</script>
</body>
