  <!-- Font preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

    :root {
      --bg: #04060f;
      --s0: #080d18;
      --acc: #00f5ff;
      --acc2: #ff0080;
      --acc3: #aaff00;
      --tx: #e0f0ff;
      --dim: #4a6080;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--tx);
      font-family: 'Orbitron', monospace;
      padding: 40px 20px;
      line-height: 1.6;
      max-width: 800px;
      margin: 0 auto;
    }

    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(18px, 4vw, 32px);
      color: var(--acc);
      text-shadow: 0 0 10px rgba(0, 245, 255, .5);
      text-align: center;
      margin-bottom: 40px;
    }

    .update-item {
      background: var(--s0);
      border: 1px solid var(--dim);
      padding: 24px;
      border-radius: 4px;
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
    }

    .update-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--acc), var(--acc2));
    }

    .version-tag {
      font-family: 'Press Start 2P', monospace;
      font-size: 14px;
      color: var(--acc2);
      margin-bottom: 10px;
      display: inline-block;
    }

    .update-title {
      font-size: 18px;
      font-weight: bold;
      color: var(--acc);
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    ul {
      list-style: none;
    }

    li {
      margin-left: 20px;
      margin-bottom: 10px;
      font-size: 14px;
      position: relative;
    }

    li::before {
      content: '▶';
      position: absolute;
      left: -20px;
      color: var(--acc3);
      font-size: 10px;
      top: 4px;
    }

    .back-btn {
      display: inline-block;
      padding: 12px 24px;
      background: var(--acc);
      color: #000;
      text-decoration: none;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      margin-top: 40px;
      border-radius: 2px;
      transition: transform 0.2s;
    }

    .back-btn:hover {
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="logo">UPDATE LOG</div>

  <div id="updateContainer"></div>

  <a href="index.html" class="back-btn">◀ メニューに戻る</a>

  <script type="module">
    import { UPDATE_LOG } from './config.js';

    const container = document.getElementById('updateContainer');
    UPDATE_LOG.forEach(item => {
      const div = document.createElement('div');
      div.className = 'update-item';

      let changesHtml = '<ul>';
      item.changes.forEach(change => {
        changesHtml += `<li>${change}</li>`;
      });
      changesHtml += '</ul>';

      div.innerHTML = `
        <div class="version-tag">Ver. ${item.version}</div>
        <div class="update-title">${item.title}</div>
        ${changesHtml}
      `;
      container.appendChild(div);
    });
  </script>
</body>

</html>
