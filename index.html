<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TETRIS BATTLE — オンライン対戦</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

        :root {
            --bg: #010306;
            --s0: #080d18;
            --s1: #0d1525;
            --s2: #111a2e;
            --b0: #1a2540;
            --b1: #243050;
            --acc: #00f5ff;
            --acc2: #ff0080;
            --acc3: #aaff00;
            --tx: #e0f0ff;
            --dim: #4a6080;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            color: var(--tx);
            font-family: 'Orbitron', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(0, 245, 255, .015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 245, 255, .015) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .logo {
            font-family: 'Press Start 2P', monospace;
            font-size: clamp(28px, 5vw, 48px);
            color: var(--acc);
            text-shadow: 0 0 20px rgba(0, 245, 255, .5), 0 0 60px rgba(0, 245, 255, .3);
            letter-spacing: 8px;
            margin-bottom: 12px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                text-shadow: 0 0 20px rgba(0, 245, 255, .5), 0 0 60px rgba(0, 245, 255, .3);
            }

            50% {
                text-shadow: 0 0 40px rgba(0, 245, 255, .9), 0 0 80px rgba(0, 245, 255, .5);
            }
        }

        .subtitle {
            font-size: 10px;
            color: var(--acc2);
            letter-spacing: 4px;
            margin-bottom: 50px;
            text-shadow: 0 0 20px rgba(255, 0, 128, .5);
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            max-width: 320px;
        }

        .menu-btn {
            background: linear-gradient(135deg, var(--acc), #0080ff);
            color: #000;
            border: none;
            padding: 18px 30px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            font-family: 'Orbitron', monospace;
            cursor: pointer;
            border-radius: 4px;
            transition: all .2s;
            text-decoration: none;
            display: inline-block;
            text-transform: uppercase;
        }

        .menu-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 245, 255, .6);
        }

        .menu-btn.secondary {
            background: transparent;
            color: var(--acc2);
            border: 2px solid var(--acc2);
        }

        .menu-btn.secondary:hover {
            background: rgba(255, 0, 128, .1);
            box-shadow: 0 0 30px rgba(255, 0, 128, .4);
        }

        .footer {
            margin-top: 60px;
            font-size: 8px;
            color: var(--dim);
            letter-spacing: 2px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">TETRIS BATTLE</div>
        <div class="subtitle">>> ONLINE MODE <<< /div>

                <div class="menu">
                    <a href="tetris-battle.html" class="menu-btn">▶ 対戦開始</a>
                    <a href="admin.html" class="menu-btn secondary">⚙ 管理画面</a>
                </div>

                <div class="footer">
                    <p>© 2024 TETRIS BATTLE ONLINE</p>
                </div>
        </div>
</body>

</html>
