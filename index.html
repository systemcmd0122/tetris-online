<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TETRIS BATTLE — オンライン対戦</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');
    :root {
      --bg: #04060f; --s0: #080d18;
      --acc: #00f5ff; --acc2: #ff0080; --acc3: #aaff00;
      --tx: #e0f0ff; --dim: #4a6080;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background: var(--bg); color: var(--tx);
      font-family: 'Orbitron', monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 100vh;
    }

    /* TETRIS BG */
    #bgCanvas { position: fixed; inset: 0; z-index: 0; }

    /* SCANLINES */
    .scanlines {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: repeating-linear-gradient(0deg,
        transparent, transparent 2px, rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px);
    }
    .scan-beam {
      position: fixed; left: 0; right: 0; height: 140px; z-index: 2; pointer-events: none;
      background: linear-gradient(180deg, transparent, rgba(0,245,255,0.04) 40%, rgba(0,245,255,0.07) 50%, rgba(0,245,255,0.04) 60%, transparent);
      animation: scanBeam 7s linear infinite;
    }
    @keyframes scanBeam { 0%{top:-140px} 100%{top:100vh} }

    /* MAIN */
    .container {
      position: relative; z-index: 10;
      text-align: center; display: flex;
      flex-direction: column; align-items: center; padding: 20px;
    }

    /* PIXEL DECO */
    .pixel-deco { display: flex; flex-direction: column; align-items: center; gap: 3px; margin-bottom: 14px; }
    .px-row { display: flex; gap: 4px; }
    .px {
      width: 13px; height: 13px; border-radius: 2px;
      animation: pxFloat 3s ease-in-out infinite;
    }
    .px:nth-child(odd)  { animation-delay: .15s; }
    .px:nth-child(even) { animation-delay: .3s; }
    @keyframes pxFloat { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
    .px-I { background:#00f5ff; box-shadow:0 0 6px #00f5ff; }
    .px-O { background:#ffff00; box-shadow:0 0 6px #ffff00; }
    .px-T { background:#cc00ff; box-shadow:0 0 6px #cc00ff; }
    .px-S { background:#aaff00; box-shadow:0 0 6px #aaff00; }
    .px-Z { background:#ff0040; box-shadow:0 0 6px #ff0040; }
    .px-J { background:#0066ff; box-shadow:0 0 6px #0066ff; }
    .px-L { background:#ff8800; box-shadow:0 0 6px #ff8800; }

    /* LOGO */
    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(22px, 5vw, 44px);
      color: var(--acc);
      text-shadow: 0 0 10px rgba(0,245,255,.9), 0 0 30px rgba(0,245,255,.5), 0 0 80px rgba(0,245,255,.3), 3px 3px 0 rgba(0,60,100,.9);
      letter-spacing: 6px; margin-bottom: 10px;
      animation: logoFlicker 5s ease-in-out infinite;
    }
    @keyframes logoFlicker { 0%,94%,100%{opacity:1} 95%{opacity:.82} 97%{opacity:1} 98%{opacity:.9} }

    .subtitle {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 1.5vw, 10px);
      color: var(--acc2); letter-spacing: 3px; margin-bottom: 40px;
      text-shadow: 0 0 15px rgba(255,0,128,.7);
      animation: subPulse 2.5s ease-in-out infinite;
    }
    @keyframes subPulse { 0%,100%{opacity:.7} 50%{opacity:1;text-shadow:0 0 25px rgba(255,0,128,1),0 0 50px rgba(255,0,128,.4)} }

    /* MENU CARD */
    .menu-card {
      background: rgba(4,6,15,0.88);
      border: 2px solid rgba(0,245,255,0.22);
      border-radius: 2px; padding: 32px 36px;
      width: 100%; max-width: 320px;
      position: relative; overflow: hidden;
      backdrop-filter: blur(12px);
    }
    /* Rainbow top border */
    .menu-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
      background: linear-gradient(90deg,#cc00ff,#0066ff,#00f5ff,#aaff00,#ff8800,#ff0040,#cc00ff);
      background-size: 300% 100%;
      animation: rainbowShift 3s linear infinite;
    }
    @keyframes rainbowShift { 0%{background-position:0% 0} 100%{background-position:300% 0} }

    /* Pixel corner accents */
    .card-corner {
      position: absolute; width: 10px; height: 10px;
      background: var(--acc); box-shadow: 0 0 8px var(--acc);
    }
    .card-corner.tl { top: 4px; left: 0; }
    .card-corner.tr { top: 4px; right: 0; }
    .card-corner.bl { bottom: 0; left: 0; }
    .card-corner.br { bottom: 0; right: 0; }

    .menu { display: flex; flex-direction: column; gap: 14px; width: 100%; }

    /* BLOCK BUTTONS */
    .menu-btn {
      display: block; width: 100%; padding: 15px 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 10px; letter-spacing: 2px;
      text-decoration: none; text-align: center;
      border: none; cursor: pointer; transition: all .12s;
      position: relative; overflow: hidden; border-radius: 2px;
    }
    .menu-btn.primary {
      background: var(--acc); color: #000;
      box-shadow: 0 5px 0 rgba(0,80,100,.9), inset 0 1px 0 rgba(255,255,255,.4);
    }
    .menu-btn.primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 0 rgba(0,80,100,.9), 0 0 35px rgba(0,245,255,.7), inset 0 1px 0 rgba(255,255,255,.4);
    }
    .menu-btn.primary:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(0,80,100,.9); }
    .menu-btn.primary::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent);
      transition: left .5s;
    }
    .menu-btn.primary:hover::before { left: 160%; }

    .menu-btn.secondary {
      background: rgba(255,0,128,0.05); color: var(--acc2);
      border: 2px solid var(--acc2);
      box-shadow: 0 5px 0 rgba(100,0,50,.9);
    }
    .menu-btn.secondary:hover {
      background: rgba(255,0,128,.1);
      transform: translateY(-3px);
      box-shadow: 0 8px 0 rgba(100,0,50,.9), 0 0 25px rgba(255,0,128,.6);
    }
    .menu-btn.secondary:active { transform: translateY(3px); box-shadow: 0 2px 0 rgba(100,0,50,.9); }

    /* FOOTER */
    .footer {
      margin-top: 22px; font-size: 9px; color: var(--dim);
      letter-spacing: 2px; position: relative; z-index: 10;
    }

    /* LOADING SCREEN */
    #loadingScreen {
      position: fixed; inset: 0; background: #04060f;
      z-index: 200; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 36px;
      transition: opacity .6s ease;
    }
    #loadingScreen.fade-out { opacity: 0; pointer-events: none; }

    .ld-logo {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(16px, 4vw, 28px);
      color: var(--acc);
      text-shadow: 0 0 20px rgba(0,245,255,.8), 3px 3px 0 rgba(0,40,80,.9);
      letter-spacing: 4px;
    }
    .ld-sub {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px; color: var(--acc2); letter-spacing: 3px;
      margin-top: -20px;
    }

    /* TETROMINO LOADER */
    .tetro-loader { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .tetro-bar { display: flex; gap: 5px; align-items: flex-end; }
    .tb-col { display: flex; flex-direction: column; gap: 2px; }
    .tb-block {
      width: 24px; height: 24px; border-radius: 3px;
      background: #0d1525; border: 1px solid #1a2540;
      transition: background .1s, box-shadow .1s;
      position: relative;
    }
    .tb-block.lit {
      border-color: transparent;
    }
    .tb-block.lit::after {
      content: ''; position: absolute;
      top: 3px; left: 3px; right: 3px; height: 5px;
      background: rgba(255,255,255,0.3); border-radius: 1px;
    }
    .ld-text {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px; color: var(--dim); letter-spacing: 3px;
      animation: ldBlink 1.2s step-end infinite;
    }
    @keyframes ldBlink { 0%,100%{opacity:1} 50%{opacity:.25} }

    /* LOAD FALLING PIECES */
    .ld-piece {
      position: fixed; pointer-events: none;
      display: grid; gap: 2px;
      animation: ldFall linear infinite;
      z-index: 199;
    }
    .ld-pb { width: 12px; height: 12px; border-radius: 2px; }
    @keyframes ldFall {
      0%   { transform: translateY(-60px) rotate(0deg); opacity:0; }
      8%   { opacity: .8; }
      92%  { opacity: .8; }
      100% { transform: translateY(105vh) rotate(270deg); opacity:0; }
    }
  </style>
</head>
<body>

<!-- LOADING SCREEN -->
<div id="loadingScreen">
  <div>
    <div class="ld-logo">TETRIS BATTLE</div>
    <div class="ld-sub" style="margin-top:10px;">ONLINE MODE</div>
  </div>
  <div class="tetro-loader">
    <div class="tetro-bar" id="tetroBar"></div>
    <div class="ld-text" id="ldText">LOADING...</div>
  </div>
</div>

<!-- BG -->
<canvas id="bgCanvas"></canvas>
<div class="scanlines"></div>
<div class="scan-beam"></div>

<!-- MAIN -->
<div class="container">
  <div class="pixel-deco" id="pixelDeco"></div>
  <div class="logo">TETRIS BATTLE</div>
  <div class="subtitle">▶ ONLINE MODE ◀</div>
  <div class="menu-card">
    <div class="card-corner tl"></div>
    <div class="card-corner tr"></div>
    <div class="card-corner bl"></div>
    <div class="card-corner br"></div>
    <div class="menu">
      <a href="tetris-battle.html" class="menu-btn primary">▶ 対戦開始</a>
      <a href="how-to.html" class="menu-btn secondary">📖 あそびかた</a>
      <a href="admin.html" class="menu-btn secondary">⚙ 管理画面</a>
    </div>
  </div>
</div>
<div class="footer">© 2025 TETRIS BATTLE ONLINE</div>

<script type="module" src="js/index-main.js"></script>
</body>
</html>
