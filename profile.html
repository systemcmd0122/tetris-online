<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プロフィール — TETRIS BATTLE</title>
  <meta name="description" content="TETRIS BATTLEのプロフィールページ。対戦履歴・スプリント記録・統計情報を確認できます。">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#04060f">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');
    :root {
      --bg: #04060f; --s0: #080d18; --s1: #0d1525;
      --acc: #00f5ff; --acc2: #ff0080; --acc3: #aaff00; --acc4: #ff8800;
      --tx: #e0f0ff; --dim: #4a6080; --border: #1a2540;
      --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--tx);
      font-family: 'Orbitron', monospace;
      min-height: 100vh;
      padding-bottom: 60px;
    }

    /* ── SCANLINES ── */
    .scanlines {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,.12) 2px, rgba(0,0,0,.12) 4px);
    }

    /* ── NAV ── */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(4,6,15,.92);
      border-bottom: 1px solid rgba(0,245,255,.15);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; gap: 12px;
    }
    .nav-logo {
      font-family: 'Press Start 2P', monospace; font-size: 11px;
      color: var(--acc); text-decoration: none; letter-spacing: 2px;
      text-shadow: 0 0 10px rgba(0,245,255,.5);
    }
    .nav-back {
      display: flex; align-items: center; gap: 6px;
      font-size: 9px; color: var(--dim); text-decoration: none;
      letter-spacing: 1px; transition: color .2s;
    }
    .nav-back:hover { color: var(--acc); }

    /* ── PAGE WRAPPER ── */
    .page {
      position: relative; z-index: 1;
      max-width: 860px; margin: 0 auto; padding: 32px 16px;
    }

    /* ── LOADING / NOT LOGGED IN ── */
    #stateMsg {
      text-align: center; padding: 80px 20px;
      font-family: 'Press Start 2P', monospace;
      font-size: 11px; color: var(--dim); letter-spacing: 2px; line-height: 2.4;
    }
    .login-btn {
      display: inline-flex; align-items: center; gap: 10px;
      margin-top: 28px; padding: 14px 28px;
      background: #fff; color: #222; border: none; border-radius: 4px;
      font-family: 'Orbitron', monospace; font-size: 12px; font-weight: 700;
      cursor: pointer; letter-spacing: 1px;
      transition: opacity .2s, transform .15s;
    }
    .login-btn:hover { opacity: .88; transform: translateY(-2px); }

    /* ── PROFILE HEADER ── */
    .profile-header {
      display: flex; align-items: center; gap: 22px;
      background: var(--s0); border: 1px solid var(--border);
      border-radius: 6px; padding: 24px 28px; margin-bottom: 24px;
      position: relative; overflow: hidden;
    }
    .profile-header::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--acc), var(--acc2), var(--acc3), var(--acc4), var(--acc));
      background-size: 300% 100%; animation: rainbowShift 4s linear infinite;
    }
    @keyframes rainbowShift { 0%{background-position:0%} 100%{background-position:300%} }
    .prof-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      border: 3px solid var(--acc); object-fit: cover; flex-shrink: 0;
      box-shadow: 0 0 20px rgba(0,245,255,.4);
    }
    .prof-initials {
      width: 72px; height: 72px; border-radius: 50%; flex-shrink: 0;
      border: 3px solid var(--acc);
      background: linear-gradient(135deg, #7700ff, #00f5ff);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Press Start 2P', monospace; font-size: 20px; color: #fff;
      box-shadow: 0 0 20px rgba(0,245,255,.4);
    }
    .prof-info { flex: 1; min-width: 0; }
    .prof-name {
      font-size: clamp(14px, 3vw, 22px); font-weight: 900;
      color: var(--acc); letter-spacing: 2px;
      text-shadow: 0 0 15px rgba(0,245,255,.4);
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      margin-bottom: 6px;
    }
    .prof-email { font-size: 10px; color: var(--dim); letter-spacing: 1px; margin-bottom: 10px; }
    .prof-meta { display: flex; gap: 16px; flex-wrap: wrap; }
    .prof-meta-item { font-size: 9px; color: var(--dim); letter-spacing: 1px; }
    .prof-meta-item span { color: var(--tx); }
    .logout-btn-sm {
      background: transparent; border: 1px solid rgba(255,0,128,.3);
      color: var(--acc2); font-family: 'Orbitron', monospace; font-size: 8px;
      letter-spacing: 1px; padding: 7px 14px; border-radius: 3px; cursor: pointer;
      transition: all .2s; white-space: nowrap; flex-shrink: 0;
    }
    .logout-btn-sm:hover { border-color: var(--acc2); background: rgba(255,0,128,.08); }

    /* ── STATS GRID ── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px; margin-bottom: 28px;
    }
    .stat-card {
      background: var(--s0); border: 1px solid var(--border); border-radius: 4px;
      padding: 18px 16px; text-align: center; position: relative; overflow: hidden;
      transition: border-color .2s, transform .15s;
    }
    .stat-card:hover { border-color: rgba(0,245,255,.4); transform: translateY(-2px); }
    .stat-card::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
    }
    .stat-card.c-acc::after  { background: var(--acc); }
    .stat-card.c-acc2::after { background: var(--acc2); }
    .stat-card.c-acc3::after { background: var(--acc3); }
    .stat-card.c-acc4::after { background: var(--acc4); }
    .stat-card.c-gold::after { background: var(--gold); }
    .stat-val {
      font-family: 'Press Start 2P', monospace; font-size: clamp(14px, 3vw, 22px);
      font-weight: 900; letter-spacing: 1px; margin-bottom: 8px;
    }
    .stat-card.c-acc  .stat-val { color: var(--acc); }
    .stat-card.c-acc2 .stat-val { color: var(--acc2); }
    .stat-card.c-acc3 .stat-val { color: var(--acc3); }
    .stat-card.c-acc4 .stat-val { color: var(--acc4); }
    .stat-card.c-gold .stat-val { color: var(--gold); }
    .stat-label { font-size: 8px; color: var(--dim); letter-spacing: 2px; }

    /* ── SECTION ── */
    .section { margin-bottom: 32px; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px; padding-bottom: 8px;
      border-bottom: 2px solid var(--border);
    }
    .section-title {
      font-family: 'Press Start 2P', monospace; font-size: 11px;
      color: var(--acc2); letter-spacing: 2px;
    }
    .section-count { font-size: 9px; color: var(--dim); letter-spacing: 1px; }

    /* ── HISTORY TABLE ── */
    .hist-table { width: 100%; border-collapse: collapse; }
    .hist-table th {
      font-size: 8px; letter-spacing: 2px; color: var(--dim);
      padding: 8px 10px; text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .hist-table td {
      font-size: 11px; padding: 10px 10px; border-bottom: 1px solid rgba(26,37,64,.6);
      vertical-align: middle;
    }
    .hist-table tr:hover td { background: rgba(0,245,255,.03); }
    .rank-badge {
      display: inline-flex; align-items: center; justify-content: center;
      width: 30px; height: 30px; border-radius: 4px;
      font-family: 'Press Start 2P', monospace; font-size: 9px; font-weight: 900;
    }
    .rank-1  { background: rgba(255,215,0,.15); color: var(--gold); border: 1px solid rgba(255,215,0,.4); }
    .rank-2  { background: rgba(192,192,192,.12); color: var(--silver); border: 1px solid rgba(192,192,192,.3); }
    .rank-3  { background: rgba(205,127,50,.12); color: var(--bronze); border: 1px solid rgba(205,127,50,.3); }
    .rank-n  { background: rgba(74,96,128,.1); color: var(--dim); border: 1px solid var(--border); }
    .mode-tag {
      font-size: 8px; letter-spacing: 1px; padding: 2px 6px; border-radius: 2px;
    }
    .mode-qm   { background: rgba(0,245,255,.1);  color: var(--acc);  border: 1px solid rgba(0,245,255,.3); }
    .mode-room { background: rgba(255,0,128,.08); color: var(--acc2); border: 1px solid rgba(255,0,128,.2); }
    .mode-bot  { background: rgba(74,96,128,.1);  color: var(--dim);  border: 1px solid var(--border); }
    .time-cell {
      font-family: 'Press Start 2P', monospace; font-size: 10px; color: var(--acc3);
    }
    .time-cell.pb { color: var(--gold); }
    .opp-names { font-size: 9px; color: var(--dim); letter-spacing: 1px; }
    .date-cell { font-size: 9px; color: var(--dim); letter-spacing: 1px; }

    .empty-state {
      text-align: center; padding: 40px 20px;
      font-size: 10px; color: var(--dim); letter-spacing: 2px; line-height: 2.2;
    }

    /* ── SPRINT RANK BADGES ── */
    .sprint-rank { font-size: 10px; letter-spacing: 1px; }
    .sprint-rank.gold   { color: var(--gold); }
    .sprint-rank.silver { color: var(--silver); }
    .sprint-rank.bronze { color: var(--bronze); }
    .sprint-rank.ranked { color: var(--dim); }

    /* ── TAB BAR ── */
    .tab-bar {
      display: flex; gap: 4px; margin-bottom: 20px;
      background: var(--s0); border: 1px solid var(--border);
      border-radius: 4px; padding: 4px;
    }
    .tab-btn {
      flex: 1; padding: 9px; border: none; border-radius: 3px; cursor: pointer;
      font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700;
      letter-spacing: 1px; transition: all .15s;
      background: transparent; color: var(--dim);
    }
    .tab-btn.active {
      background: rgba(0,245,255,.1); color: var(--acc);
      box-shadow: inset 0 0 0 1px rgba(0,245,255,.3);
    }
    .tab-pane { display: none; }
    .tab-pane.active { display: block; }

    /* ── WIN RATE BAR ── */
    .wr-bar-wrap {
      background: var(--s1); border-radius: 2px; height: 6px; margin-top: 8px; overflow: hidden;
    }
    .wr-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--acc3), var(--acc)); transition: width 1s ease; }

    /* ── USERNAME EDIT ── */
    .prof-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
    .edit-name-btn {
      background: transparent; border: 1px solid rgba(0,245,255,.3);
      color: var(--dim); border-radius: 3px; padding: 3px 8px;
      font-family: 'Orbitron', monospace; font-size: 8px; letter-spacing: 1px;
      cursor: pointer; transition: all .2s; flex-shrink: 0;
    }
    .edit-name-btn:hover { border-color: var(--acc); color: var(--acc); }
    .name-edit-row {
      display: none; align-items: center; gap: 8px; margin-bottom: 6px;
    }
    .name-edit-row.show { display: flex; }
    .name-input {
      background: rgba(0,245,255,.05); border: 1px solid rgba(0,245,255,.3);
      color: var(--tx); font-family: 'Orbitron', monospace; font-size: 13px;
      font-weight: 700; letter-spacing: 1px; padding: 6px 10px; border-radius: 3px;
      outline: none; width: 180px; transition: border-color .2s;
    }
    .name-input:focus { border-color: var(--acc); }
    .name-save-btn {
      background: var(--acc); color: #000; border: none; border-radius: 3px;
      font-family: 'Orbitron', monospace; font-size: 9px; font-weight: 700;
      letter-spacing: 1px; padding: 7px 12px; cursor: pointer;
      transition: opacity .15s, transform .12s; flex-shrink: 0;
    }
    .name-save-btn:hover { opacity: .85; transform: translateY(-1px); }
    .name-save-btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    .name-cancel-btn {
      background: transparent; border: 1px solid var(--border); color: var(--dim);
      font-family: 'Orbitron', monospace; font-size: 9px; letter-spacing: 1px;
      padding: 7px 10px; border-radius: 3px; cursor: pointer; transition: all .2s; flex-shrink: 0;
    }
    .name-cancel-btn:hover { border-color: var(--acc2); color: var(--acc2); }
    .name-msg { font-size: 9px; letter-spacing: 1px; margin-top: 4px; min-height: 14px; }
    .name-msg.ok  { color: var(--acc3); }
    .name-msg.err { color: var(--acc2); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .profile-header { flex-direction: column; align-items: flex-start; gap: 14px; }
      .hist-table th:nth-child(4), .hist-table td:nth-child(4),
      .hist-table th:nth-child(5), .hist-table td:nth-child(5) { display: none; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── PAGE LOADER ── */
    #pageLoader {
      position: fixed; inset: 0; background: var(--bg); z-index: 500;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 20px;
      transition: opacity .4s ease;
    }
    #pageLoader.hide { opacity: 0; pointer-events: none; }
    .ld-logo {
      font-family: 'Press Start 2P', monospace; font-size: 14px;
      color: var(--acc); letter-spacing: 3px;
      text-shadow: 0 0 16px rgba(0,245,255,.7);
    }
    .ld-sub { font-family: 'Press Start 2P', monospace; font-size: 8px; color: var(--acc2); letter-spacing: 2px; }
    .ld-dots { font-size: 10px; color: var(--dim); letter-spacing: 6px; animation: ldBlink 1.2s step-end infinite; }
    @keyframes ldBlink { 0%,100%{opacity:1} 50%{opacity:.2} }
  </style>
</head>
<body>
  <div class="scanlines"></div>

  <!-- PAGE LOADER -->
  <div id="pageLoader">
    <div class="ld-logo">TETRIS BATTLE</div>
    <div class="ld-sub">PROFILE</div>
    <div class="ld-dots">...</div>
  </div>

  <!-- NAV -->
  <nav class="nav">
    <a href="index.html" class="nav-logo">TETRIS BATTLE</a>
    <a href="index.html" class="nav-back">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><path d="M7 1L3 5l4 4"/></svg>
      メニューに戻る
    </a>
  </nav>

  <div class="page">
    <!-- STATE: loading / not logged in / error -->
    <div id="stateMsg"></div>

    <!-- MAIN CONTENT (hidden until loaded) -->
    <div id="mainContent" style="display:none;">

      <!-- PROFILE HEADER -->
      <div class="profile-header" id="profileHeader"></div>

      <!-- STATS GRID -->
      <div class="stats-grid" id="statsGrid"></div>

      <!-- TAB BAR -->
      <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('multi')">
          <svg width="10" height="10" viewBox="0 0 13 13" fill="currentColor" style="vertical-align:middle;margin-right:4px;"><circle cx="4" cy="4" r="2.2"/><circle cx="9" cy="4" r="2.2"/><path d="M0 11c0-2.2 1.8-4 4-4h5c2.2 0 4 1.8 4 4H0z"/></svg>
          マルチ対戦
        </button>
        <button class="tab-btn" onclick="switchTab('sprint')">
          <svg width="10" height="10" viewBox="0 0 13 13" fill="currentColor" style="vertical-align:middle;margin-right:4px;"><path d="M2 10L6 2l2 4 2-2 1 6z"/></svg>
          スプリント
        </button>
      </div>

      <!-- MULTI HISTORY TAB -->
      <div class="tab-pane active" id="tab-multi">
        <div class="section">
          <div class="section-header">
            <div class="section-title">▶ MULTI HISTORY</div>
            <div class="section-count" id="multiCount"></div>
          </div>
          <div id="multiHistContent"></div>
        </div>
      </div>

      <!-- SPRINT HISTORY TAB -->
      <div class="tab-pane" id="tab-sprint">
        <div class="section">
          <div class="section-header">
            <div class="section-title">▶ SPRINT HISTORY</div>
            <div class="section-count" id="sprintCount"></div>
          </div>
          <div id="sprintHistContent"></div>
        </div>
      </div>

    </div><!-- /mainContent -->
  </div><!-- /page -->

  <script>
    function fmtTime(ms) {
      if (ms == null) return '--:--';
      const m = Math.floor(ms / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      const cs = Math.floor((ms % 1000) / 10);
      return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(cs).padStart(2,'0')}`;
    }
    function fmtDate(ts) {
      if (!ts) return '---';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('ja-JP', { year:'2-digit', month:'2-digit', day:'2-digit' });
    }
    function fmtDateFull(ts) {
      if (!ts) return '---';
      const d = ts.toDate ? ts.toDate() : new Date(ts);
      return d.toLocaleDateString('ja-JP', { year:'numeric', month:'2-digit', day:'2-digit' });
    }

    function switchTab(name) {
      document.querySelectorAll('.tab-btn').forEach((b,i) => {
        b.classList.toggle('active', ['multi','sprint'][i] === name);
      });
      document.querySelectorAll('.tab-pane').forEach(p => {
        p.classList.toggle('active', p.id === 'tab-' + name);
      });
    }

    function renderProfileHeader(user, profile) {
      const el = document.getElementById('profileHeader');
      const name = profile?.displayName || user.displayName || 'PLAYER';
      const email = user.email || '';
      const photo = user.photoURL;
      const createdAt = profile?.createdAt ? fmtDateFull(profile.createdAt) : '---';
      const lastSeen  = profile?.lastSeen  ? fmtDateFull(profile.lastSeen)  : '---';
      const avatarHtml = photo
        ? `<img class="prof-avatar" src="${photo}" alt="" id="profAvatarImg">`
        : `<div class="prof-initials" id="profInitials">${name.slice(0,2).toUpperCase()}</div>`;
      el.innerHTML = `
        ${avatarHtml}
        <div class="prof-info">
          <div class="prof-name-row">
            <div class="prof-name" id="profNameDisplay">${name}</div>
            <button class="edit-name-btn" id="editNameBtn" title="ユーザー名を変更">✎ 編集</button>
          </div>
          <div class="name-edit-row" id="nameEditRow">
            <input class="name-input" id="nameInput" maxlength="20" value="${name}" autocomplete="off" spellcheck="false">
            <button class="name-save-btn" id="nameSaveBtn">保存</button>
            <button class="name-cancel-btn" id="nameCancelBtn">×</button>
          </div>
          <div class="name-msg" id="nameMsg"></div>
          <div class="prof-email">${email}</div>
          <div class="prof-meta">
            <div class="prof-meta-item">登録日 <span>${createdAt}</span></div>
            <div class="prof-meta-item">最終プレイ <span>${lastSeen}</span></div>
          </div>
        </div>
        <button class="logout-btn-sm" id="logoutBtnProf">ログアウト</button>
      `;
    }

    function renderStats(profile, multiHistory, sprintHistory) {
      const el = document.getElementById('statsGrid');
      const totalGames  = profile?.totalMultiGames || 0;
      const totalWins   = profile?.totalWins || 0;
      const winRate     = totalGames > 0 ? Math.round(totalWins / totalGames * 100) : 0;
      const bestSprint  = profile?.bestSprintMs;
      const totalLines  = profile?.totalLinesCleared || 0;
      const totalSprint = profile?.totalSprintGames || 0;

      // Win streak from recent history
      let streak = 0;
      for (const h of multiHistory) { if (h.rank === 1) streak++; else break; }

      el.innerHTML = `
        <div class="stat-card c-acc">
          <div class="stat-val">${totalGames}</div>
          <div class="stat-label">MULTI GAMES</div>
        </div>
        <div class="stat-card c-acc3">
          <div class="stat-val">${winRate}<span style="font-size:.55em">%</span></div>
          <div class="stat-label">WIN RATE</div>
          <div class="wr-bar-wrap"><div class="wr-bar" id="wrBar" style="width:0%"></div></div>
        </div>
        <div class="stat-card c-gold">
          <div class="stat-val">${bestSprint != null ? fmtTime(bestSprint) : '---'}</div>
          <div class="stat-label">BEST SPRINT</div>
        </div>
        <div class="stat-card c-acc2">
          <div class="stat-val">${totalLines.toLocaleString()}</div>
          <div class="stat-label">TOTAL LINES</div>
        </div>
        <div class="stat-card c-acc4">
          <div class="stat-val">${totalSprint}</div>
          <div class="stat-label">SPRINT RUNS</div>
        </div>
        <div class="stat-card c-acc">
          <div class="stat-val">${streak}</div>
          <div class="stat-label">WIN STREAK</div>
        </div>
      `;
      // Animate win rate bar
      setTimeout(() => {
        const bar = document.getElementById('wrBar');
        if (bar) bar.style.width = winRate + '%';
      }, 100);
    }

    function renderMultiHistory(history) {
      const el = document.getElementById('multiHistContent');
      document.getElementById('multiCount').textContent = `${history.length}件`;
      if (!history.length) {
        el.innerHTML = `<div class="empty-state">まだ対戦履歴がありません<br><br>マルチ対戦をプレイしてみよう！</div>`;
        return;
      }
      const modeLabel = { qm: 'QUICK', room: 'ROOM', bot: 'BOT' };
      const modeClass = { qm: 'mode-qm', room: 'mode-room', bot: 'mode-bot' };
      let rows = history.map(h => {
        const rank = h.rank || 1;
        const rankClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : 'rank-n';
        const rankLabel = rank === 1 ? '1st' : rank === 2 ? '2nd' : rank === 3 ? '3rd' : rank + 'th';
        const mode = h.mode || 'room';
        const opps = (h.opponentNames || []).join(', ') || '---';
        return `<tr>
          <td><span class="rank-badge ${rankClass}">${rankLabel}</span></td>
          <td><span class="mode-tag ${modeClass[mode]}">${modeLabel[mode]||mode}</span> <span style="font-size:9px;color:var(--dim)">${h.totalPlayers||2}人</span></td>
          <td style="font-family:'Press Start 2P',monospace;font-size:10px;color:var(--acc)">${(h.score||0).toLocaleString()}</td>
          <td style="color:var(--tx)">${h.lines||0}</td>
          <td><span class="opp-names">${opps}</span></td>
          <td><span class="date-cell">${fmtDate(h.ts)}</span></td>
        </tr>`;
      }).join('');
      el.innerHTML = `
        <div style="overflow-x:auto;">
          <table class="hist-table">
            <thead><tr>
              <th>RANK</th><th>MODE</th><th>SCORE</th><th>LINES</th><th>OPPONENT</th><th>DATE</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function renderSprintHistory(history) {
      const el = document.getElementById('sprintHistContent');
      document.getElementById('sprintCount').textContent = `${history.length}件`;
      if (!history.length) {
        el.innerHTML = `<div class="empty-state">まだスプリント履歴がありません<br><br>スプリントモードをプレイしてみよう！</div>`;
        return;
      }
      // Find personal best
      const best = Math.min(...history.map(h => h.ms).filter(Boolean));
      let rows = history.map(h => {
        const isPB = h.ms === best;
        const gr = h.globalRank;
        let rankHtml = '<span class="sprint-rank ranked">---</span>';
        if (gr === 1) rankHtml = '<span class="sprint-rank gold">🥇 #1</span>';
        else if (gr === 2) rankHtml = '<span class="sprint-rank silver">🥈 #2</span>';
        else if (gr === 3) rankHtml = '<span class="sprint-rank bronze">🥉 #3</span>';
        else if (gr) rankHtml = `<span class="sprint-rank ranked">#${gr}</span>`;
        return `<tr>
          <td><span class="time-cell${isPB?' pb':''}">${fmtTime(h.ms)}${isPB ? ' 🏅' : ''}</span></td>
          <td>${rankHtml}</td>
          <td style="font-family:'Press Start 2P',monospace;font-size:10px;color:var(--acc)">${(h.score||0).toLocaleString()}</td>
          <td style="color:var(--tx)">${h.lines||40}</td>
          <td><span class="date-cell">${fmtDate(h.ts)}</span></td>
        </tr>`;
      }).join('');
      el.innerHTML = `
        <div style="overflow-x:auto;">
          <table class="hist-table">
            <thead><tr>
              <th>TIME</th><th>GLOBAL RANK</th><th>SCORE</th><th>LINES</th><th>DATE</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }
  </script>

  <script type="module">
    import { onAuthReady, signIn, signOut } from './auth.js';
    import { upsertUserProfile, getUserProfile, getMultiHistory, getSprintHistory } from './db.js';

    const stateMsg    = document.getElementById('stateMsg');
    const mainContent = document.getElementById('mainContent');
    const loader      = document.getElementById('pageLoader');

    function hideLoader() {
      loader.classList.add('hide');
      setTimeout(() => loader.remove(), 500);
    }

    function showNotLoggedIn() {
      stateMsg.innerHTML = `
        TETRIS BATTLE<br><br>
        <span style="color:var(--dim);font-size:9px;">
          プロフィールを見るには<br>Googleアカウントでログインしてください
        </span><br>
        <button class="login-btn" id="loginBtnPage">
          <svg width="18" height="18" viewBox="0 0 48 48">
            <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.3 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.7 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.7-.4-3.9z"/>
            <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.6 15.1 19 12 24 12c3.1 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.7 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
            <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.3 35.4 26.8 36 24 36c-5.2 0-9.7-3.3-11.3-8H6.1C9.4 35.6 16.2 44 24 44z"/>
            <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.3-2.3 4.3-4.2 5.6l6.2 5.2C37 38.2 44 33 44 24c0-1.3-.1-2.7-.4-3.9z"/>
          </svg>
          Googleでログイン
        </button>`;
      document.getElementById('loginBtnPage')?.addEventListener('click', async () => {
        try { await signIn(); } catch(e) {}
      });
    }

    function wireNameEdit(user) {
      const editBtn    = document.getElementById('editNameBtn');
      const editRow    = document.getElementById('nameEditRow');
      const nameInput  = document.getElementById('nameInput');
      const saveBtn    = document.getElementById('nameSaveBtn');
      const cancelBtn  = document.getElementById('nameCancelBtn');
      const nameDisp   = document.getElementById('profNameDisplay');
      const initials   = document.getElementById('profInitials');
      const msg        = document.getElementById('nameMsg');
      if (!editBtn) return;

      // 編集モードを開く
      editBtn.addEventListener('click', () => {
        editRow.classList.add('show');
        editBtn.style.display = 'none';
        nameInput.focus();
        nameInput.select();
        msg.textContent = '';
        msg.className = 'name-msg';
      });

      // キャンセル
      cancelBtn.addEventListener('click', () => {
        editRow.classList.remove('show');
        editBtn.style.display = '';
        nameInput.value = nameDisp.textContent;
        msg.textContent = '';
        msg.className = 'name-msg';
      });

      // Enterキーで保存
      nameInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') saveBtn.click();
        if (e.key === 'Escape') cancelBtn.click();
      });

      // 保存
      saveBtn.addEventListener('click', async () => {
        const raw = nameInput.value.trim();
        if (!raw) { msg.textContent = '⚠ 名前を入力してください'; msg.className = 'name-msg err'; return; }
        if (raw.length > 20) { msg.textContent = '⚠ 20文字以内で入力してください'; msg.className = 'name-msg err'; return; }
        if (raw === nameDisp.textContent) { cancelBtn.click(); return; }

        saveBtn.disabled = true;
        saveBtn.textContent = '保存中...';
        msg.textContent = '';
        msg.className = 'name-msg';

        try {
          // Firestoreのプロフィールを更新
          const { getFirestore, doc, updateDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
          const { initializeApp, getApps } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
          const fbCfg = { apiKey:"AIzaSyCjYKsc8eT9gDXEMQsfI0ZJ7UeuLwrDTxw", authDomain:"tetris-online-9c827.firebaseapp.com", projectId:"tetris-online-9c827" };
          const app = getApps().length ? getApps()[0] : initializeApp(fbCfg);
          const fs = getFirestore(app);
          await updateDoc(doc(fs, 'users', user.uid), { displayName: raw });

          // 表示を更新
          nameDisp.textContent = raw;
          if (initials) initials.textContent = raw.slice(0, 2).toUpperCase();
          editRow.classList.remove('show');
          editBtn.style.display = '';
          msg.textContent = '✓ ユーザー名を更新しました';
          msg.className = 'name-msg ok';
          setTimeout(() => { msg.textContent = ''; msg.className = 'name-msg'; }, 3000);
        } catch(e) {
          msg.textContent = '⚠ 更新に失敗しました: ' + (e.message || 'エラー');
          msg.className = 'name-msg err';
        } finally {
          saveBtn.disabled = false;
          saveBtn.textContent = '保存';
        }
      });
    }

    async function loadProfile(user) {
      mainContent.style.display = 'block';
      stateMsg.innerHTML = '';

      // Ensure profile doc exists
      await upsertUserProfile(user).catch(() => {});

      const [profile, multiHistory, sprintHistory] = await Promise.all([
        getUserProfile(user.uid),
        getMultiHistory(user.uid, 50),
        getSprintHistory(user.uid, 50),
      ]);

      renderProfileHeader(user, profile);
      renderStats(profile, multiHistory, sprintHistory);
      renderMultiHistory(multiHistory);
      renderSprintHistory(sprintHistory);

      // ユーザー名編集ロジックをセット
      wireNameEdit(user);

      document.getElementById('logoutBtnProf')?.addEventListener('click', async () => {
        await signOut();
      });
    }

    onAuthReady(async user => {
      if (user) {
        try {
          await loadProfile(user);
        } catch(e) {
          stateMsg.innerHTML = `<span style="color:var(--acc2)">⚠ データの読み込みに失敗しました<br><br>${e.message}</span>`;
          mainContent.style.display = 'none';
        }
      } else {
        mainContent.style.display = 'none';
        showNotLoggedIn();
      }
      hideLoader();
    });
  </script>
</body>
</html>
