<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>テトリス検定 — TETRIS BATTLE</title>
  <meta name="description" content="テトリス検定：テトリスの知識をテストする5段階の認定試験。合格するとプロフィールにバッジが表示されます。">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://systemcmd0122.github.io/tetris-online/exam.html">
  <meta name="theme-color" content="#04060f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta property="og:type" content="website">
  <meta property="og:title" content="テトリス検定 — TETRIS BATTLE">
  <meta property="og:description" content="テトリスの知識をテストする5段階の認定試験。合格でプロフィールにバッジが表示されます。">
  <meta property="og:url" content="https://systemcmd0122.github.io/tetris-online/exam.html">
  <meta property="og:image" content="https://systemcmd0122.github.io/tetris-online/ogp.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');
    :root {
      --bg:#04060f; --s0:#080d18; --s1:#0d1525;
      --acc:#00f5ff; --acc2:#ff0080; --acc3:#aaff00;
      --tx:#e0f0ff; --dim:#4a6080; --border:#1a2540;
      --gold:#ffd700; --silver:#c0c0c0; --bronze:#cd7f32;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{background:var(--bg);color:var(--tx);font-family:'Orbitron',monospace;min-height:100vh;padding-bottom:60px}
    .scanlines{position:fixed;inset:0;z-index:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.1) 2px,rgba(0,0,0,.1) 4px)}

    .page{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:28px 16px}

    /* ──── LEVEL SELECT ──── */
    .exam-hero{text-align:center;padding:20px 0 32px}
    .exam-title{font-family:'Press Start 2P',monospace;font-size:clamp(16px,4vw,28px);color:var(--acc);text-shadow:0 0 20px rgba(0,245,255,.5);letter-spacing:3px;margin-bottom:8px}
    .exam-sub{font-size:10px;color:var(--dim);letter-spacing:2px;margin-bottom:6px}
    .exam-desc{font-size:12px;color:var(--tx);line-height:2;max-width:500px;margin:0 auto 0}

    .level-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:32px}
    .level-card{background:var(--s0);border:1px solid var(--border);border-radius:6px;padding:20px 16px;cursor:pointer;transition:transform .2s,border-color .2s,box-shadow .2s;position:relative;overflow:hidden;text-align:center}
    .level-card:hover{transform:translateY(-4px)}
    .level-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .level-card.lv1::before{background:var(--bronze)}
    .level-card.lv2::before{background:var(--silver)}
    .level-card.lv3::before{background:var(--gold)}
    .level-card.lv4::before{background:#00f5ff}
    .level-card.lv5::before{background:linear-gradient(90deg,#ff0080,#cc00ff,#00f5ff,#aaff00,#ff8800)}
    .level-card:hover.lv1{border-color:var(--bronze);box-shadow:0 4px 20px rgba(205,127,50,.2)}
    .level-card:hover.lv2{border-color:var(--silver);box-shadow:0 4px 20px rgba(192,192,192,.2)}
    .level-card:hover.lv3{border-color:var(--gold);box-shadow:0 4px 20px rgba(255,215,0,.2)}
    .level-card:hover.lv4{border-color:var(--acc);box-shadow:0 4px 20px rgba(0,245,255,.2)}
    .level-card:hover.lv5{border-color:#cc00ff;box-shadow:0 4px 20px rgba(204,0,255,.2)}
    .lv-badge-icon{font-size:28px;margin-bottom:10px;display:block;filter:drop-shadow(0 0 6px currentColor)}
    .lv1 .lv-badge-icon{color:var(--bronze)}
    .lv2 .lv-badge-icon{color:var(--silver)}
    .lv3 .lv-badge-icon{color:var(--gold)}
    .lv4 .lv-badge-icon{color:var(--acc)}
    .lv5 .lv-badge-icon{color:#cc00ff}
    .lv-name{font-family:'Press Start 2P',monospace;font-size:11px;margin-bottom:4px}
    .lv1 .lv-name{color:var(--bronze)} .lv2 .lv-name{color:var(--silver)}
    .lv3 .lv-name{color:var(--gold)} .lv4 .lv-name{color:var(--acc)} .lv5 .lv-name{color:#cc00ff}
    .lv-subtitle{font-size:9px;color:var(--dim);letter-spacing:1px;margin-bottom:12px}
    .lv-info{font-size:8px;color:var(--dim);letter-spacing:1px;line-height:2}
    .lv-info span{color:var(--tx)}
    .lv-passed{display:inline-flex;align-items:center;gap:4px;margin-top:10px;background:rgba(170,255,0,.1);border:1px solid rgba(170,255,0,.35);color:var(--acc3);border-radius:2px;font-size:7px;padding:3px 8px;letter-spacing:1px;font-family:'Press Start 2P',monospace}
    .lv-locked{display:inline-flex;align-items:center;gap:4px;margin-top:10px;background:rgba(74,96,128,.1);border:1px solid rgba(74,96,128,.3);color:var(--dim);border-radius:2px;font-size:7px;padding:3px 8px;letter-spacing:1px}

    /* ──── QUIZ SCREEN ──── */
    #quizScreen{display:none}
    .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
    .quiz-level-label{font-family:'Press Start 2P',monospace;font-size:10px;letter-spacing:2px}
    .lv1-c{color:var(--bronze)} .lv2-c{color:var(--silver)} .lv3-c{color:var(--gold)} .lv4-c{color:var(--acc)} .lv5-c{color:#cc00ff}
    .quiz-progress-bar{height:4px;background:var(--border);border-radius:4px;margin-bottom:4px;overflow:hidden}
    .quiz-progress-fill{height:100%;border-radius:4px;transition:width .4s ease;background:var(--acc)}
    .quiz-progress-text{font-size:8px;color:var(--dim);letter-spacing:1px;text-align:right}
    .quiz-timer{font-family:'Press Start 2P',monospace;font-size:14px;color:var(--acc);background:rgba(0,245,255,.07);border:1px solid rgba(0,245,255,.2);border-radius:4px;padding:6px 12px;min-width:64px;text-align:center;transition:color .3s,background .3s}
    .quiz-timer.warn{color:var(--acc2);background:rgba(255,0,128,.1);border-color:rgba(255,0,128,.3);animation:timerPulse .5s ease-in-out infinite alternate}
    @keyframes timerPulse{from{transform:scale(1)}to{transform:scale(1.06)}}

    .question-card{background:var(--s0);border:1px solid var(--border);border-radius:6px;padding:24px 20px;margin-bottom:16px;position:relative;overflow:hidden}
    .question-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--acc),var(--acc2))}
    .q-num{font-size:8px;color:var(--dim);letter-spacing:2px;margin-bottom:10px;font-family:'Press Start 2P',monospace}
    .q-text{font-size:clamp(12px,2.5vw,15px);line-height:1.8;font-weight:700;letter-spacing:1px}

    .options-grid{display:grid;gap:10px}
    .opt-btn{background:var(--s1);border:1px solid var(--border);border-radius:4px;padding:14px 16px;text-align:left;cursor:pointer;font-family:'Orbitron',monospace;font-size:12px;color:var(--tx);letter-spacing:1px;transition:all .15s;display:flex;align-items:center;gap:12px;width:100%}
    .opt-btn:hover:not(:disabled){border-color:rgba(0,245,255,.4);background:rgba(0,245,255,.05);transform:translateX(3px)}
    .opt-btn:disabled{cursor:not-allowed}
    .opt-btn.correct{border-color:var(--acc3);background:rgba(170,255,0,.1);color:var(--acc3)}
    .opt-btn.wrong{border-color:var(--acc2);background:rgba(255,0,128,.08);color:var(--acc2)}
    .opt-btn.reveal{border-color:rgba(170,255,0,.3);background:rgba(170,255,0,.04);color:var(--acc3)}
    .opt-key{font-family:'Press Start 2P',monospace;font-size:8px;min-width:20px;color:var(--dim);flex-shrink:0}
    .opt-btn.correct .opt-key{color:var(--acc3)}
    .opt-btn.wrong .opt-key{color:var(--acc2)}

    .expl-box{background:rgba(0,245,255,.04);border:1px solid rgba(0,245,255,.15);border-radius:4px;padding:12px 14px;margin-top:10px;font-size:11px;line-height:1.8;color:#a0c8e8;display:none}
    .expl-box.show{display:block}

    .quiz-next-btn{margin-top:16px;display:flex;justify-content:flex-end}
    .next-btn{background:var(--acc);color:#000;border:none;border-radius:3px;font-family:'Press Start 2P',monospace;font-size:9px;padding:12px 20px;cursor:pointer;letter-spacing:1px;transition:opacity .15s,transform .12s;display:none}
    .next-btn.show{display:block}
    .next-btn:hover{opacity:.85;transform:translateY(-1px)}

    /* ──── RESULT SCREEN ──── */
    #resultScreen{display:none;text-align:center}
    .result-badge{font-size:64px;margin:20px 0;filter:drop-shadow(0 0 20px currentColor);animation:badgePop .5s cubic-bezier(.3,1.4,.5,1) forwards}
    @keyframes badgePop{from{transform:scale(0) rotate(-10deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
    .result-title{font-family:'Press Start 2P',monospace;font-size:clamp(14px,3vw,20px);letter-spacing:3px;margin-bottom:8px}
    .result-score{font-family:'Press Start 2P',monospace;font-size:13px;color:var(--dim);letter-spacing:2px;margin-bottom:20px}
    .result-score span{color:var(--acc);font-size:20px}
    .result-msg{font-size:12px;line-height:2;color:var(--tx);max-width:440px;margin:0 auto 24px}
    .result-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .res-btn{padding:12px 20px;border-radius:3px;font-family:'Press Start 2P',monospace;font-size:9px;cursor:pointer;letter-spacing:1px;transition:all .15s;text-decoration:none;display:inline-block}
    .res-btn.primary{background:var(--acc);color:#000;border:none}
    .res-btn.primary:hover{opacity:.85;transform:translateY(-1px)}
    .res-btn.secondary{background:transparent;color:var(--acc);border:1px solid rgba(0,245,255,.4)}
    .res-btn.secondary:hover{background:rgba(0,245,255,.06);transform:translateY(-1px)}
    .res-btn.danger{background:transparent;color:var(--acc2);border:1px solid rgba(255,0,128,.3)}
    .res-btn.danger:hover{background:rgba(255,0,128,.06);transform:translateY(-1px)}
    .result-save-msg{font-size:9px;color:var(--acc3);letter-spacing:1px;margin-top:12px;min-height:16px;font-family:'Press Start 2P',monospace}

    /* ──── SCORE BREAKDOWN ──── */
    .score-breakdown{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin:16px 0}
    .sc-dot{width:14px;height:14px;border-radius:2px;flex-shrink:0}
    .sc-dot.c{background:var(--acc3);box-shadow:0 0 4px var(--acc3)}
    .sc-dot.w{background:var(--acc2);opacity:.5}
    .sc-dot.s{background:var(--dim);opacity:.5}

    /* ──── RULES ──── */
    .rules-box{background:var(--s0);border:1px solid var(--border);border-radius:6px;padding:18px 16px;margin-bottom:24px}
    .rules-title{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--acc2);letter-spacing:2px;margin-bottom:10px}
    .rules-list{list-style:none;display:flex;flex-direction:column;gap:6px}
    .rules-list li{font-size:11px;color:var(--dim);letter-spacing:1px;padding-left:16px;position:relative;line-height:1.7}
    .rules-list li::before{content:'▶';position:absolute;left:0;color:var(--acc3);font-size:8px;top:3px}
    .rules-list li span{color:var(--tx)}
  </style>
</head>
<body>
<div class="scanlines" aria-hidden="true"></div>

<!-- Nav will be injected here -->

<div class="page">

  <!-- ══ LEVEL SELECT ══ -->
  <section id="levelSelect">
    <div class="exam-hero">
      <div class="exam-title">テトリス検定</div>
      <div class="exam-sub">TETRIS CERTIFICATION EXAM</div>
      <div class="exam-desc" style="margin-top:10px">テトリスの知識を試す5段階の認定試験。<br>合格するとプロフィールにバッジが授与されます。</div>
    </div>

    <div class="rules-box">
      <div class="rules-title">▶ 受験ルール</div>
      <ul class="rules-list">
        <li>各レベル <span>10問</span>、制限時間 <span>問題ごとに30秒</span></li>
        <li><span>7問以上（70%）</span> 正解で合格</li>
        <li>合格するとプロフィールに <span>バッジが表示</span> されます</li>
        <li>ログインしていない場合、結果は <span>保存されません</span></li>
        <li>何度でも <span>再受験</span> できます（最高成績が保存されます）</li>
      </ul>
    </div>

    <div class="level-grid" id="levelGrid"></div>

    <a href="index.html" style="display:inline-block;padding:12px 24px;background:var(--acc);color:#000;text-decoration:none;font-family:'Press Start 2P',monospace;font-size:9px;border-radius:2px;transition:transform .2s;letter-spacing:1px" onmouseover="this.style.transform='translateY(-2px)'" onmouseout="this.style.transform=''">◀ メニューへ</a>
  </section>

  <!-- ══ QUIZ SCREEN ══ -->
  <section id="quizScreen">
    <div class="quiz-header">
      <div>
        <div class="quiz-level-label" id="quizLevelLabel">入門</div>
        <div class="quiz-progress-bar"><div class="quiz-progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="quiz-progress-text" id="progressText">0 / 10</div>
      </div>
      <div class="quiz-timer" id="quizTimer">30</div>
    </div>

    <div class="question-card">
      <div class="q-num" id="qNum">Q 01</div>
      <div class="q-text" id="qText"></div>
    </div>

    <div class="options-grid" id="optionsGrid"></div>
    <div class="expl-box" id="explBox"></div>

    <div class="quiz-next-btn">
      <button class="next-btn" id="nextBtn">次の問題 ▶</button>
    </div>
  </section>

  <!-- ══ RESULT SCREEN ══ -->
  <section id="resultScreen">
    <div class="result-badge" id="resultBadge">★</div>
    <div class="result-title" id="resultTitle">合格！</div>
    <div class="result-score" id="resultScore"><span>8</span> / 10</div>
    <div class="score-breakdown" id="scoreBreakdown"></div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-save-msg" id="resultSaveMsg"></div>
    <div class="result-btns">
      <button class="res-btn danger" id="retryBtn">もう一度挑戦</button>
      <button class="res-btn secondary" id="changeBtn">レベル選択へ</button>
      <a href="profile.html" class="res-btn primary">プロフィールへ ▶</a>
    </div>
  </section>

</div><!-- /page -->

<script type="module">
import { mountNav } from './nav.js';
mountNav();

// ── Exam data ──────────────────────────────────────────
const LEVELS = [
  {
    id: 'lv1', cls: 'lv1', name: '入門', subtitle: 'Entry Level', icon: '<svg width="24" height="24" viewBox="0 0 20 20"><circle cx="10" cy="10" r="8" fill="#cd7f32"/></svg>',
    color: 'var(--bronze)', colorCls: 'lv1-c', passMark: 7,
    desc: 'テトリスの基本操作・ルールの確認',
    badge: { icon: '<svg width=\"16\" height=\"16\" viewBox=\"0 0 20 20\"><circle cx=\"10\" cy=\"10\" r=\"8\" fill=\"#cd7f32\"/></svg>', label: 'ENTRY', color: '#cd7f32' },
    questions: [
      { q:'テトリスで使われるミノの種類は全部で何種類か？', opts:['5種類','6種類','7種類','8種類'], ans:2, expl:'I・O・T・S・Z・L・Jの7種類のミノが使用されます。' },
      { q:'4ライン同時消しを英語で何という？', opts:['Perfect','Triple','Tetris','Super'], ans:2, expl:'4ライン消しは「テトリス(Tetris)」と呼ばれ、ゲーム名の由来にもなっています。' },
      { q:'ミノを瞬時に一番下まで落として固定する操作を何という？', opts:['ソフトドロップ','ハードドロップ','クイックフォール','ロックダウン'], ans:1, expl:'スペースキーで行うハードドロップです。ミノが即座に固定されます。' },
      { q:'ゲームオーバーになるのはどんな時か？', opts:['100ライン消した時','5分経過した時','ミノが最上段を超えた時','コンボが切れた時'], ans:2, expl:'ミノが積み上がりフィールドの最上段を超えた時にゲームオーバーとなります。' },
      { q:'ミノを1つ手元に保存しておく機能を何という？', opts:['ストック','ホールド','バンク','セーブ'], ans:1, expl:'ShiftキーまたはCキーでホールドできます。保存したミノはいつでも取り出せます。' },
      { q:'Iミノ（細長いミノ）の色は何色か？', opts:['黄色','赤色','シアン（水色）','緑色'], ans:2, expl:'Iミノはシアン（水色）です。4マス直線のミノで、テトリスを狙うのに最適です。' },
      { q:'標準的なテトリスのフィールドの横幅は何マスか？', opts:['8マス','10マス','12マス','16マス'], ans:1, expl:'テトリスのフィールドは横10マス、縦20マスが標準です。' },
      { q:'3ライン同時消しを英語で何という？', opts:['Single','Double','Triple','Quadruple'], ans:2, expl:'1=Single、2=Double、3=Triple、4=Tetrisです。' },
      { q:'ゴーストピースとは何か？', opts:['透明になるミノ','ミノの落下位置を示す半透明の表示','ホールドされたミノ','消えかけのライン'], ans:1, expl:'ゴーストピースは現在のミノが落ちる位置を示すガイドです。配置の予測に役立ちます。' },
      { q:'Oミノ（正方形のミノ）の色は何色か？', opts:['青色','黄色','赤色','紫色'], ans:1, expl:'Oミノは黄色です。2×2の正方形で、回転させても形が変わりません。' },
    ]
  },
  {
    id: 'lv2', cls: 'lv2', name: '初級', subtitle: 'Beginner Level', icon: '⬜',
    color: 'var(--silver)', colorCls: 'lv2-c', passMark: 7,
    desc: '対戦ルール・スコアシステムの理解',
    badge: { icon: '<svg width=\"16\" height=\"16\" viewBox=\"0 0 20 20\"><circle cx=\"10\" cy=\"10\" r=\"8\" fill=\"#c0c0c0\"/></svg>', label: 'BEGINNER', color: '#c0c0c0' },
    questions: [
      { q:'対戦テトリスで2ライン消しの時、相手に送るガベージは何ライン？', opts:['0ライン','1ライン','2ライン','4ライン'], ans:1, expl:'2ライン消し(Double)で相手に1ライン送ります。3ライン→2ライン、4ライン(テトリス)→4ラインです。' },
      { q:'Back-to-Back (B2B) が発動する条件は？', opts:['コンボが5回以上続いた時','テトリスまたはT-Spinを連続して行った時','ホールドを使わずプレイした時','パーフェクトクリア後'], ans:1, expl:'テトリスまたはT-Spinを連続して行うとB2Bが発動し、攻撃力が1.5倍になります。' },
      { q:'Back-to-Backボーナスによって攻撃力は何倍になるか？', opts:['1.2倍','1.3倍','1.5倍','2倍'], ans:2, expl:'B2Bが発動すると攻撃力が1.5倍に増加します。連続でテトリスやT-Spinを決めましょう。' },
      { q:'T-Spinとは何か？', opts:['Tミノで4ラインを消す技','Tミノを回転させて隙間にはめ込んでラインを消す技','Tミノを3回連続で使う技','Tミノでコンボを繋げる技'], ans:1, expl:'T-SpinはTミノをスピンさせて隙間に潜り込ませることでラインを消す上級テクニックです。' },
      { q:'コンボとは何か？', opts:['一度に複数のラインを消すこと','連続でライン消しを行うこと','T-Spinを連続して決めること','攻撃を受けて反撃すること'], ans:1, expl:'コンボは毎ターン途切れずにライン消しを続けることです。コンボ数が増えるほど攻撃力が上がります。' },
      { q:'対戦で4ライン消し(テトリス)の時、相手に送るライン数は？', opts:['2ライン','3ライン','4ライン','6ライン'], ans:2, expl:'テトリス(4ライン消し)は相手に4ライン送ります。B2B中なら×1.5=6ラインになります。' },

// ── State ─────────────────────────────────────────────
let _currentLevel = null;
let _qIndex = 0;
let _answers = []; // null | 'correct' | 'wrong'
let _timerInterval = null;
let _timeLeft = 30;
let _answered = false;
let _passedLevels = {}; // { lv1: { score, ts } }

// ── DOM helpers ───────────────────────────────────────
const $ = id => document.getElementById(id);

function showScreen(name) {
  ['levelSelect','quizScreen','resultScreen'].forEach(id => {
    $(id).style.display = id === name ? '' : 'none';
  });
}

// ── Load/Save from localStorage (fallback without auth) ──
function _loadLocal() {
  try { return JSON.parse(localStorage.getItem('tetris_exam') || '{}'); } catch { return {}; }
}
function _saveLocal(data) {
  try { localStorage.setItem('tetris_exam', JSON.stringify(data)); } catch {}
}

function loadPassed() {
  _passedLevels = _loadLocal();
}

function markPassed(levelId, score) {
  const prev = _passedLevels[levelId];
  if (!prev || score > prev.score) {
    _passedLevels[levelId] = { score, ts: Date.now() };
    _saveLocal(_passedLevels);
  }
}

// ── Render level grid ─────────────────────────────────
function renderLevelGrid() {
  const grid = $('levelGrid');
  grid.innerHTML = '';
  LEVELS.forEach(lv => {
    const passed = _passedLevels[lv.id];
    const card = document.createElement('div');
    card.className = `level-card ${lv.cls}`;
    card.setAttribute('role','button');
    card.setAttribute('tabindex','0');
    card.innerHTML = `
      <span class="lv-badge-icon" aria-hidden="true">${lv.icon}</span>
      <div class="lv-name ${lv.colorCls}">${lv.name}</div>
      <div class="lv-subtitle">${lv.subtitle}</div>
      <div class="lv-info">問題数 <span>10問</span>&nbsp; 合格ライン <span>${lv.passMark}/10</span><br>難易度 <span>${lv.desc}</span></div>
      ${passed
        ? `<div class="lv-passed">✓ 合格 ${passed.score}/10</div>`
        : `<div class="lv-locked" style="opacity:.6">未挑戦</div>`}
    `;
    card.addEventListener('click', () => startExam(lv));
    card.addEventListener('keydown', e => { if (e.key==='Enter'||e.key===' ') startExam(lv); });
    grid.appendChild(card);
  });
}

// ── Start exam ────────────────────────────────────────
function startExam(lv) {
  _currentLevel = lv;
  _qIndex = 0;
  _answers = [];
  showScreen('quizScreen');
  const label = $('quizLevelLabel');
  label.textContent = `${lv.icon} ${lv.name}`;
  label.className = `quiz-level-label ${lv.colorCls}`;
  renderQuestion();
}

function renderQuestion() {
  const lv = _currentLevel;
  const q = lv.questions[_qIndex];
  _answered = false;

  $('qNum').textContent = `Q ${String(_qIndex + 1).padStart(2,'0')} / 10`;
  $('qText').textContent = q.q;
  $('explBox').textContent = '';
  $('explBox').classList.remove('show');
  $('nextBtn').classList.remove('show');

  const pct = (_qIndex / 10) * 100;
  $('progressFill').style.width = pct + '%';
  $('progressText').textContent = `${_qIndex} / 10`;

  const grid = $('optionsGrid');
  grid.innerHTML = '';
  const KEYS = ['A','B','C','D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="opt-key">${KEYS[i]}</span>${opt}`;
    btn.addEventListener('click', () => answerQ(i));
    grid.appendChild(btn);
  });

  startTimer();
}

function startTimer() {
  clearInterval(_timerInterval);
  _timeLeft = 30;
  const el = $('quizTimer');
  el.textContent = _timeLeft;
  el.classList.remove('warn');
  _timerInterval = setInterval(() => {
    _timeLeft--;
    el.textContent = _timeLeft;
    if (_timeLeft <= 10) el.classList.add('warn');
    if (_timeLeft <= 0) {
      clearInterval(_timerInterval);
      if (!_answered) answerQ(-1); // time out
    }
  }, 1000);
}

function answerQ(chosen) {
  if (_answered) return;
  _answered = true;
  clearInterval(_timerInterval);
  $('quizTimer').classList.remove('warn');
  $('quizTimer').textContent = '–';

  const q = _currentLevel.questions[_qIndex];
  const isCorrect = chosen === q.ans;
  _answers.push(isCorrect ? 'correct' : 'wrong');

  const btns = $('optionsGrid').querySelectorAll('.opt-btn');
  btns.forEach((btn, i) => {
    btn.disabled = true;
    if (i === q.ans) btn.classList.add('correct');
    else if (i === chosen) btn.classList.add('wrong');
  });

  const expl = $('explBox');
  expl.textContent = (isCorrect ? '✓ 正解！ ' : '✗ 不正解。') + q.expl;
  expl.classList.add('show');

  $('nextBtn').classList.add('show');
  $('nextBtn').textContent = _qIndex < 9 ? '次の問題 ▶' : '結果を見る ▶';
}

$('nextBtn').addEventListener('click', () => {
  _qIndex++;
  if (_qIndex >= 10) showResult();
  else renderQuestion();
});

// ── Result ────────────────────────────────────────────
function showResult() {
  showScreen('resultScreen');
  const lv = _currentLevel;
  const score = _answers.filter(a => a === 'correct').length;
  const passed = score >= lv.passMark;

  $('resultBadge').innerHTML = passed ? `<span class='badge-icon-svg'>${lv.badge.icon}</span>` : '<span style="color:var(--acc2)">FAIL</span>';
  $('resultBadge').style.color = passed ? lv.badge.color : '#ff0080';

  $('resultTitle').textContent = passed ? `${lv.name} 合格！` : '不合格…';
  $('resultTitle').style.color = passed ? lv.badge.color : '#ff0080';

  $('resultScore').innerHTML = `<span style="color:${passed ? lv.badge.color : '#ff0080'}">${score}</span> / 10`;

  // dots
  const bd = $('scoreBreakdown');
  bd.innerHTML = _answers.map(a => `<span class="sc-dot ${a==='correct'?'c':'w'}"></span>`).join('') +
    Array(10 - _answers.length).fill('<span class="sc-dot s"></span>').join('');

  $('resultMsg').textContent = passed
    ? `おめでとうございます！${lv.name}認定バッジがプロフィールに追加されます。ログイン中の場合は自動的に保存されます。`
    : `合格ライン${lv.passMark}問のところ${score}問でした。もう一度挑戦してみましょう！`;

  if (passed) markPassed(lv.id, score);

  // Save to Firestore
  $('resultSaveMsg').textContent = '';
  _saveToFirestore(lv.id, score, passed);
}

async function _saveToFirestore(levelId, score, passed) {
  try {
    const { getCurrentUser } = await import('./auth.js');
    const user = getCurrentUser();
    if (!user) { $('resultSaveMsg').textContent = '※ログインすると結果が保存されます'; return; }
    const { saveExamResult } = await import('./db.js');
    await saveExamResult(user.uid, { levelId, score, passed });
    if (passed) $('resultSaveMsg').textContent = '✓ バッジをプロフィールに保存しました';
    else $('resultSaveMsg').textContent = '';
  } catch (e) {
    console.warn('exam save error', e);
  }
}

$('retryBtn').addEventListener('click', () => { if (_currentLevel) startExam(_currentLevel); });
$('changeBtn').addEventListener('click', () => { loadPassed(); renderLevelGrid(); showScreen('levelSelect'); });

// ── Init ──────────────────────────────────────────────
loadPassed();
renderLevelGrid();
showScreen('levelSelect');
</script>
</body>
</html>
