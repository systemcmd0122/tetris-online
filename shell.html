<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TETRIS BATTLE — BGM MODE</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');
    :root {
      --bg:#04060f;--s0:#080d18;--s1:#0d1525;
      --acc:#00f5ff;--acc2:#ff0080;--acc3:#aaff00;
      --tx:#e0f0ff;--dim:#4a6080;--bar:60px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;background:var(--bg);}
    body{display:flex;flex-direction:column;font-family:'Orbitron',monospace;}

    /* IFRAME */
    #mainFrame{flex:1;border:none;width:100%;display:block;min-height:0;}

    /* ─── BAR ─── */
    #bar{
      height:var(--bar);flex-shrink:0;background:var(--s0);
      border-top:1px solid rgba(0,245,255,.12);
      display:flex;align-items:center;position:relative;z-index:200;
    }
    #bar::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,#c0f,#06f,#0ff,#af0,#f80,#f04,#c0f);
      background-size:300% 100%;animation:rb 3s linear infinite;
    }
    @keyframes rb{to{background-position:-300% 0}}

    #openBtn{
      height:100%;width:56px;flex-shrink:0;background:rgba(170,255,0,.07);
      border:none;border-right:1px solid rgba(0,245,255,.1);
      color:var(--acc3);cursor:pointer;transition:background .2s;
      display:flex;align-items:center;justify-content:center;
    }
    #openBtn:hover,#openBtn.active{background:rgba(0,245,255,.12);color:var(--acc);}

    .bar-inner{flex:1;display:flex;align-items:center;gap:6px;padding:0 10px;min-width:0;overflow:hidden;}

    .tr{background:none;border:none;color:var(--acc);width:38px;height:38px;
      border-radius:4px;cursor:pointer;transition:all .15s;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;}
    .tr:hover{background:rgba(0,245,255,.1);}
    .tr:active{transform:scale(.88);}

    #npWrap{flex:1;min-width:0;overflow:hidden;}
    #npLabel{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--acc3);letter-spacing:2px;margin-bottom:3px;}
    #npTitle{font-size:12px;font-weight:700;color:var(--acc);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    #npSub{font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}

    .vol{display:flex;align-items:center;gap:6px;flex-shrink:0;width:110px;}
    .vi{color:var(--dim);flex-shrink:0;display:flex;}
    input[type=range]{
      -webkit-appearance:none;flex:1;height:3px;
      background:linear-gradient(90deg,var(--acc) var(--p,70%),rgba(74,96,128,.4) var(--p,70%));
      border-radius:2px;cursor:pointer;outline:none;
    }
    input[type=range]::-webkit-slider-thumb{
      -webkit-appearance:none;width:14px;height:14px;
      background:var(--acc);border-radius:50%;box-shadow:0 0 5px var(--acc);
    }

    /* ─── DRAWER ─── */
    #drawer{
      position:fixed;bottom:var(--bar);left:0;right:0;
      height:520px;max-height:calc(100vh - var(--bar) - 50px);
      background:var(--s0);border-top:2px solid rgba(0,245,255,.2);
      z-index:199;display:flex;flex-direction:column;
      transform:translateY(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    }
    #drawer.open{transform:translateY(0);}

    .dh{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid rgba(0,245,255,.1);flex-shrink:0;}
    .dh-title{font-family:'Press Start 2P',monospace;font-size:9px;color:var(--acc);flex:1;letter-spacing:1px;}
    .dh-close{
      background:none;border:1px solid rgba(255,0,128,.3);color:var(--dim);
      font-family:'Press Start 2P',monospace;font-size:7px;
      padding:6px 12px;border-radius:3px;cursor:pointer;transition:all .15s;
    }
    .dh-close:hover{color:var(--acc2);border-color:var(--acc2);}

    /* TABS */
    .tabs{display:flex;border-bottom:1px solid rgba(0,245,255,.08);flex-shrink:0;background:var(--s1);}
    .tab{
      flex:1;padding:12px 4px;text-align:center;
      font-family:'Press Start 2P',monospace;font-size:8px;
      color:var(--dim);cursor:pointer;transition:all .15s;
      border-bottom:3px solid transparent;letter-spacing:.5px;
    }
    .tab.on{color:var(--acc);border-bottom-color:var(--acc);background:rgba(0,245,255,.04);}
    .tab:hover:not(.on){color:var(--tx);}

    .panel{display:none;flex-direction:column;flex:1;overflow:hidden;}
    .panel.on{display:flex;}

    /* ─── SEARCH ─── */
    #pSearch{padding:10px;gap:8px;}
    .genre-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;flex-shrink:0;}
    .genre-row::-webkit-scrollbar{height:3px;}
    .genre-row::-webkit-scrollbar-thumb{background:var(--acc3);border-radius:2px;}
    .gbtn{
      background:rgba(170,255,0,.07);border:1px solid rgba(170,255,0,.25);
      color:var(--acc3);font-family:'Press Start 2P',monospace;font-size:6px;
      padding:8px 11px;border-radius:3px;cursor:pointer;white-space:nowrap;
      flex-shrink:0;transition:background .12s;
    }
    .gbtn:hover{background:rgba(170,255,0,.2);}

    .srow{display:flex;gap:6px;flex-shrink:0;}
    .sinput{
      flex:1;background:rgba(0,0,0,.5);border:1px solid rgba(0,245,255,.2);
      color:var(--tx);font-family:'Orbitron',monospace;font-size:13px;
      padding:10px 12px;border-radius:3px;outline:none;transition:border-color .2s;
    }
    .sinput:focus{border-color:var(--acc);}
    .sinput::placeholder{color:var(--dim);}
    .sgo{
      background:var(--acc);color:#000;border:none;
      font-family:'Press Start 2P',monospace;font-size:8px;
      padding:10px 14px;border-radius:3px;cursor:pointer;flex-shrink:0;
    }
    .sgo:disabled{opacity:.35;cursor:not-allowed;}

    .stat{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--dim);flex-shrink:0;min-height:14px;letter-spacing:1px;}
    .spin{display:inline-block;width:10px;height:10px;border:2px solid rgba(0,245,255,.2);border-top-color:var(--acc);border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:5px;}
    @keyframes spin{to{transform:rotate(360deg)}}

    .rlist{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:5px;}
    .rlist::-webkit-scrollbar,.qlist::-webkit-scrollbar,#plDetailSongs::-webkit-scrollbar,#plList::-webkit-scrollbar{width:4px;}
    .rlist::-webkit-scrollbar-thumb{background:rgba(0,245,255,.3);border-radius:2px;}
    .qlist::-webkit-scrollbar-thumb{background:rgba(170,255,0,.3);border-radius:2px;}
    #plDetailSongs::-webkit-scrollbar-thumb,#plList::-webkit-scrollbar-thumb{background:rgba(255,0,128,.3);border-radius:2px;}

    .ri{
      display:flex;align-items:center;gap:10px;
      background:rgba(0,245,255,.04);border:1px solid rgba(0,245,255,.08);
      border-radius:4px;padding:8px 10px;cursor:pointer;transition:all .12s;
    }
    .ri:hover{background:rgba(0,245,255,.1);border-color:rgba(0,245,255,.25);}
    .ri.np{border-color:var(--acc3);background:rgba(170,255,0,.07);}
    .ri-thumb{width:48px;height:36px;object-fit:cover;border-radius:2px;flex-shrink:0;background:var(--s1);}
    .ri-info{flex:1;overflow:hidden;}
    .ri-ttl{font-size:11px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .ri-ch{font-size:10px;color:var(--dim);margin-top:3px;}
    .ri-act{display:flex;align-items:center;gap:2px;flex-shrink:0;}
    .ri-ibtn{
      width:36px;height:36px;display:flex;align-items:center;justify-content:center;
      border-radius:4px;cursor:pointer;transition:all .12s;
      border:1px solid transparent;font-size:16px;user-select:none;
    }
    .ri-ibtn.add-btn{color:var(--acc3);}
    .ri-ibtn.add-btn:hover{background:rgba(170,255,0,.15);border-color:rgba(170,255,0,.3);}
    .ri-ibtn.pl-btn{color:var(--acc2);}
    .ri-ibtn.pl-btn:hover{background:rgba(255,0,128,.15);border-color:rgba(255,0,128,.3);}

    /* ─── QUEUE ─── */
    #pQueue{padding:10px;gap:8px;}
    .qa{display:flex;align-items:center;gap:6px;flex-shrink:0;flex-wrap:wrap;}
    .qbtn{
      font-family:'Press Start 2P',monospace;font-size:7px;
      padding:8px 12px;border-radius:3px;cursor:pointer;
      border:1px solid rgba(255,0,128,.3);color:var(--dim);background:transparent;
    }
    .qbtn:hover{color:var(--acc2);border-color:var(--acc2);}
    .mode-btn{
      font-family:'Press Start 2P',monospace;font-size:6px;
      padding:7px 11px;border-radius:3px;cursor:pointer;
      border:1px solid rgba(74,96,128,.3);color:var(--dim);background:transparent;
    }
    .mode-btn.on{background:rgba(0,245,255,.1);border-color:var(--acc);color:var(--acc);}
    .qlist{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;}

    .qi{
      display:flex;align-items:center;gap:8px;
      background:rgba(170,255,0,.04);border:1px solid rgba(170,255,0,.08);
      border-radius:4px;padding:11px 12px;cursor:pointer;
    }
    .qi:hover{background:rgba(170,255,0,.1);}
    .qi.nq{border-color:var(--acc3);background:rgba(170,255,0,.08);}
    .qi-n{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--dim);width:18px;flex-shrink:0;}
    .qi-t{flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx);}
    .qi-del{color:var(--acc2);font-size:20px;opacity:.35;padding:0 4px;flex-shrink:0;line-height:1;transition:opacity .15s;}
    .qi:hover .qi-del{opacity:1;}

    /* ─── PLAYLISTS ─── */
    #pPlaylists{position:relative;overflow:hidden;}

    /* View A: list */
    #plViewList{
      display:flex;flex-direction:column;
      position:absolute;inset:0;transition:transform .25s ease;
    }
    #plViewList.hidden{transform:translateX(-100%);pointer-events:none;}

    .pl-list-head{
      display:flex;align-items:center;gap:8px;
      padding:10px 14px;border-bottom:1px solid rgba(0,245,255,.08);
      flex-shrink:0;background:var(--s1);
    }
    .pl-list-title{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--acc2);flex:1;}
    #plSyncDot{font-size:10px;flex-shrink:0;transition:color .3s;}
    .pl-new-btn{
      background:var(--acc3);color:#000;border:none;
      font-family:'Press Start 2P',monospace;font-size:7px;
      padding:8px 13px;border-radius:3px;cursor:pointer;flex-shrink:0;
    }
    .pl-new-btn:hover{opacity:.85;}

    #plList{flex:1;overflow-y:auto;display:flex;flex-direction:column;}

    .pl-item{
      display:flex;align-items:center;gap:10px;
      padding:14px;cursor:pointer;
      border-bottom:1px solid rgba(0,245,255,.05);transition:background .12s;
    }
    .pl-item:hover{background:rgba(255,0,128,.07);}
    .pl-item-icon{font-size:20px;flex-shrink:0;opacity:.8;}
    .pl-item-info{flex:1;min-width:0;}
    .pl-item-name{font-size:13px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .pl-item-cnt{font-size:10px;color:var(--dim);margin-top:3px;}
    .pl-arrow{color:var(--dim);font-size:18px;flex-shrink:0;opacity:.5;}

    /* View B: detail */
    #plViewDetail{
      display:flex;flex-direction:column;
      position:absolute;inset:0;
      transform:translateX(100%);transition:transform .25s ease;pointer-events:none;
    }
    #plViewDetail.visible{transform:translateX(0);pointer-events:auto;}

    .pl-detail-head{
      display:flex;align-items:center;gap:8px;
      padding:10px 14px;border-bottom:1px solid rgba(0,245,255,.08);
      flex-shrink:0;background:var(--s1);
    }
    .pl-back{
      background:none;border:1px solid rgba(0,245,255,.2);color:var(--acc);
      font-family:'Press Start 2P',monospace;font-size:7px;
      padding:7px 11px;border-radius:3px;cursor:pointer;flex-shrink:0;
    }
    .pl-back:hover{background:rgba(0,245,255,.1);}
    #plDetailName{font-size:13px;font-weight:700;color:var(--acc2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

    .pl-detail-acts{
      display:flex;gap:6px;padding:8px 14px;
      border-bottom:1px solid rgba(0,245,255,.06);flex-shrink:0;flex-wrap:wrap;
    }
    .pla{
      font-family:'Press Start 2P',monospace;font-size:6px;
      padding:8px 12px;border-radius:3px;cursor:pointer;
      border:1px solid rgba(74,96,128,.35);color:var(--dim);background:transparent;
    }
    .pla:hover{color:var(--acc);border-color:var(--acc);}
    .pla.play{background:var(--acc3);color:#000;border-color:var(--acc3);}
    .pla.play:hover{opacity:.85;}
    .pla.del:hover{color:var(--acc2);border-color:var(--acc2);}

    #plDetailSongs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding:8px 10px;}

    .ps{
      display:flex;align-items:center;gap:8px;
      background:rgba(255,0,128,.04);border:1px solid rgba(255,0,128,.08);
      border-radius:4px;padding:11px 12px;cursor:pointer;transition:all .12s;
    }
    .ps:hover{background:rgba(255,0,128,.1);}
    .ps.np{border-color:var(--acc3);background:rgba(170,255,0,.07);}
    .ps-n{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--dim);width:20px;flex-shrink:0;}
    .ps-t{flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--tx);}
    .ps-del{color:var(--acc2);font-size:20px;opacity:.3;padding:0 4px;flex-shrink:0;line-height:1;transition:opacity .15s;}
    .ps:hover .ps-del{opacity:1;}

    /* ─── DROPDOWN ─── */
    #plDropdown{
      position:fixed;background:var(--s1);border:1px solid rgba(0,245,255,.3);
      border-radius:6px;z-index:1001;min-width:200px;overflow:hidden;
      box-shadow:0 8px 32px rgba(0,0,0,.8);display:none;
    }
    #plDropdown.show{display:block;}
    .pld-head{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--acc);padding:10px 13px;border-bottom:1px solid rgba(0,245,255,.1);letter-spacing:1px;}
    .pld-row{padding:12px 14px;font-size:12px;color:var(--tx);cursor:pointer;display:flex;align-items:center;gap:8px;transition:background .12s;}
    .pld-row:hover{background:rgba(0,245,255,.1);}
    .pld-row.done{color:var(--acc3);}
    .pld-row.newpl{color:var(--acc3);font-weight:700;border-top:1px solid rgba(0,245,255,.08);}
    .pld-row.none{color:var(--dim);cursor:default;font-size:11px;}
    .pld-row.none:hover{background:none;}

    /* ─── MODAL ─── */
    #modal{
      position:fixed;inset:0;background:rgba(0,0,0,.88);
      z-index:1002;display:none;align-items:center;justify-content:center;
      backdrop-filter:blur(6px);
    }
    #modal.show{display:flex;}
    .modal-box{
      background:var(--s1);border:1px solid var(--acc);border-radius:8px;
      padding:28px;width:min(360px,90vw);box-shadow:0 0 50px rgba(0,245,255,.2);
    }
    .modal-ttl{font-family:'Press Start 2P',monospace;font-size:10px;color:var(--acc);margin-bottom:18px;letter-spacing:1px;line-height:1.8;}
    .modal-inp{
      width:100%;background:rgba(0,0,0,.6);border:1px solid rgba(0,245,255,.3);
      color:var(--tx);font-family:'Orbitron',monospace;font-size:15px;
      padding:12px 14px;border-radius:4px;outline:none;
      transition:border-color .2s,box-shadow .2s;margin-bottom:16px;
    }
    .modal-inp:focus{border-color:var(--acc);box-shadow:0 0 0 3px rgba(0,245,255,.1);}
    .modal-btns{display:flex;gap:10px;}
    .mbtn{flex:1;padding:12px;border-radius:4px;cursor:pointer;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;text-align:center;border:none;}
    .mbtn.ok{background:var(--acc);color:#000;}
    .mbtn.ok:hover{opacity:.85;}
    .mbtn.cancel{background:transparent;border:1px solid var(--dim);color:var(--tx);}
    .mbtn.cancel:hover{border-color:var(--acc2);color:var(--acc2);}

    /* ─── TOAST ─── */
    #toast{
      position:fixed;bottom:calc(var(--bar) + 16px);left:50%;
      transform:translateX(-50%) translateY(14px);
      background:var(--s1);border:1px solid var(--acc3);border-radius:6px;
      padding:11px 22px;font-family:'Press Start 2P',monospace;font-size:7px;color:var(--acc3);
      z-index:600;opacity:0;transition:opacity .2s,transform .2s;
      pointer-events:none;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.5);
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    .empty{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--dim);text-align:center;padding:32px 16px;line-height:2.6;}
    #ytHidden{position:fixed;left:-9999px;top:-9999px;width:1px;height:1px;}
  </style>
</head>
<body>

<iframe id="mainFrame" src="index.html" allowfullscreen></iframe>

<!-- DRAWER -->
<div id="drawer">
  <div class="dh">
    <span class="dh-title">♫ MUSIC PLAYER</span>
    <button class="dh-close" onclick="closeDrawer()">✕ CLOSE</button>
  </div>
  <div class="tabs">
    <div class="tab on" id="tab-search"    onclick="swTab('search')">SEARCH</div>
    <div class="tab"    id="tab-queue"     onclick="swTab('queue')">QUEUE <span id="qBadge"></span></div>
    <div class="tab"    id="tab-playlists" onclick="swTab('playlists')">LIST <span id="plBadge"></span></div>
  </div>

  <!-- SEARCH PANEL -->
  <div class="panel on" id="pSearch">
    <div style="padding:10px;display:flex;flex-direction:column;gap:8px;flex:1;overflow:hidden;">
      <div class="genre-row" id="genreRow"></div>
      <div class="srow">
        <input type="text" id="sinput" class="sinput" placeholder="曲名・アーティスト・ジャンル..."
               onkeydown="if(event.key==='Enter')doSearch()">
        <button class="sgo" id="sgo" onclick="doSearch()">GO</button>
      </div>
      <div class="stat" id="stat"></div>
      <div class="rlist" id="rlist"><div class="empty">ジャンルを選ぶか<br>検索してみよう</div></div>
    </div>
  </div>

  <!-- QUEUE PANEL -->
  <div class="panel" id="pQueue">
    <div style="padding:10px;display:flex;flex-direction:column;gap:8px;flex:1;overflow:hidden;">
      <div class="qa">
        <button class="qbtn" onclick="clearQueue()">✕ CLEAR</button>
        <div style="flex:1"></div>
        <button class="mode-btn" id="mShuffle" onclick="toggleMode('shuffle')">SHUFFLE</button>
        <button class="mode-btn" id="mRepeat"  onclick="toggleMode('repeat')">REPEAT</button>
        <button class="mode-btn" id="mRepeat1" onclick="toggleMode('repeat1')">×1</button>
      </div>
      <div class="qlist" id="qlist"><div class="empty">キューが空です<br>SEARCH から追加しよう</div></div>
    </div>
  </div>

  <!-- PLAYLISTS PANEL -->
  <div class="panel" id="pPlaylists">
    <!-- View A: 一覧 -->
    <div id="plViewList">
      <div class="pl-list-head">
        <span class="pl-list-title">MY PLAYLISTS</span>
        <span id="plSyncDot" title="クラウド同期状態" style="color:var(--dim);">●</span>
        <button class="pl-new-btn" onclick="newPlaylist()">＋ NEW</button>
      </div>
      <div id="plList"><div class="empty">プレイリストがありません<br>NEW で作成しよう</div></div>
    </div>

    <!-- View B: 詳細 -->
    <div id="plViewDetail">
      <div class="pl-detail-head">
        <button class="pl-back" onclick="goPlList()">◀ BACK</button>
        <span id="plDetailName">—</span>
      </div>
      <div class="pl-detail-acts">
        <button class="pla play"  onclick="playCurrentPl()">▶ 再生</button>
        <button class="pla"       onclick="renameCurPl()">RENAME</button>
        <button class="pla del"   onclick="deleteCurPl()">DELETE</button>
      </div>
      <div id="plDetailSongs"><div class="empty">曲がありません<br>SEARCH の + ボタンで追加</div></div>
    </div>
  </div>
</div>

<!-- MUSIC BAR -->
<div id="bar">
  <button id="openBtn" onclick="toggleDrawer()">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <!-- stems -->
      <line x1="4" y1="17" x2="4" y2="7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <line x1="14" y1="14.5" x2="14" y2="4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <!-- beam -->
      <line x1="4" y1="7" x2="14" y2="4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      <!-- noteheads -->
      <ellipse cx="3" cy="17.5" rx="3" ry="2.2" fill="currentColor" transform="rotate(-15 3 17.5)"/>
      <ellipse cx="13" cy="15" rx="3" ry="2.2" fill="currentColor" transform="rotate(-15 13 15)"/>
    </svg>
  </button>
  <div class="bar-inner">

const FB_CFG = {

let yt = null, ytOk = false;
let queue = [], qi = -1;
let shuffle = false, repeatAll = false, repeatOne = false;
let results = [];
let drawerOpen = false;

// ── Playlists: localStorage is ALWAYS the source of truth ──
function loadPls(){ try{ return JSON.parse(localStorage.getItem(PL_KEY)||'[]'); }catch(e){ return []; } }
function savePls(arr){ try{ localStorage.setItem(PL_KEY, JSON.stringify(arr)); }catch(e){} }
// Always read fresh from localStorage
function getPls(){ return loadPls(); }
function getPl(id){ return loadPls().find(p=>p.id===id); }

// ╔══════════════════════════════════╗
//  FIREBASE — optional cloud sync
// ╚══════════════════════════════════╝
function initFirebase(){
  try{
    const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(FB_CFG);
    fbDb = firebase.database(app);

    // Listen for remote changes and MERGE into localStorage
    fbDb.ref(FB_PATH).on('value', snap => {
      const remoteData = snap.val() || {};
      const remote = Object.values(remoteData).filter(p => p && p.id && p.name);
      if(!remote.length) return; // don't wipe local data if Firebase is empty

      const local = loadPls();
      const localIds = new Set(local.map(p => p.id));
      let changed = false;

      // Add/update playlists from Firebase that are newer
      remote.forEach(rp => {
        const lp = local.find(p => p.id === rp.id);
        if(!lp){
          // New playlist from another user
          local.push(rp);
          changed = true;
        } else if((rp.updatedAt||0) > (lp.updatedAt||0)){
          // Remote is newer, update local
          Object.assign(lp, rp);
          changed = true;
        }
      });

      if(changed){
        local.sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));
        savePls(local);
        renderPlList();
        if(selPl) renderPlDetail();
      }

      setSyncStatus(true);
    });

    fbDb.ref('.info/connected').on('value', snap => {
      setSyncStatus(!!snap.val());
      fbSyncActive = !!snap.val();
    });
  }catch(e){
    console.warn('Firebase init error:', e);
    setSyncStatus(false);
  }
}

function setSyncStatus(online){
  const el = document.getElementById('plSyncDot');
  if(!el) return;
  el.textContent = online ? '●' : '○';
  el.style.color = online ? 'var(--acc3)' : 'var(--dim)';
  el.title = online ? 'クラウド同期中' : 'ローカル保存のみ';
}

// Push single playlist to Firebase (best-effort, no error shown to user)
function fbPush(pl){
  if(!fbDb || !fbSyncActive) return;
  try{
    const clean = {
      id:pl.id, name:pl.name,
      songs:(pl.songs||[]).map(s=>({id:s.id,title:s.title,channel:s.channel||'',thumb:s.thumb||''})),
      createdAt:pl.createdAt||Date.now(), updatedAt:pl.updatedAt||Date.now()
    };
    fbDb.ref(FB_PATH+'/'+pl.id).set(clean).catch(()=>{});
  }catch(e){}
}

// Delete playlist from Firebase
function fbRemove(id){
  if(!fbDb) return;
  try{ fbDb.ref(FB_PATH+'/'+id).remove().catch(()=>{}); }catch(e){}
}

// ╔══════════════════════════════════╗
//  INIT
// ╚══════════════════════════════════╝
(function init(){
  initFirebase();
  initGenres();
  const sv = localStorage.getItem('yt_vol');
  if(sv !== null){
    const el = document.getElementById('vol');
    el.value = sv; el.style.setProperty('--p', sv+'%');
  }
  renderPlList();

  document.addEventListener('click', e=>{
    if(!e.target.closest('#plDropdown') && !e.target.closest('.ri-ibtn.pl-btn')) closeDrop();
  });

  // URL import
  const p = new URLSearchParams(location.search).get('pl');
  if(p){
    try{
      const pl = JSON.parse(atob(p));
      if(pl && pl.name && Array.isArray(pl.songs)){
        pl.id = Date.now()+'_'+Math.random().toString(36).slice(2);
        pl.createdAt = Date.now(); pl.updatedAt = Date.now();
        const arr = loadPls(); arr.push(pl); savePls(arr);
        fbPush(pl);
        renderPlList();
        selPl = pl.id; showPlDetail(pl.id);
        swTab('playlists'); openDrawer();
        toast(`「${pl.name}」をインポートしました`);
      }
    }catch(e){}
    history.replaceState(null,'',location.pathname);
  }
})();

// ╔══════════════════════════════════╗
//  YouTube IFrame API
// ╚══════════════════════════════════╝
function onYouTubeIframeAPIReady(){
  yt = new YT.Player('ytPlayer',{
    height:'1', width:'1',
    playerVars:{autoplay:0,controls:0},
    events:{
      onReady:()=>{ ytOk=true; const v=localStorage.getItem('yt_vol'); if(v!==null) yt.setVolume(+v); },
      onStateChange: e=>{
        const P = YT.PlayerState;
        if(e.data===P.ENDED){ repeatOne?(yt.seekTo(0),yt.playVideo()):playNext(); }
        setPlayBtn(e.data===P.PLAYING);
      },
      onError:()=>{ setTimeout(playNext,1500); }
    }
  });
}
function setPlayBtn(playing){
  document.getElementById('iconPlay').style.display  = playing?'none':'';
  document.getElementById('iconPause').style.display = playing?'':'none';
}

// ╔══════════════════════════════════╗
//  DRAWER / TABS
// ╚══════════════════════════════════╝
function toggleDrawer(){ drawerOpen ? closeDrawer() : openDrawer(); }
function openDrawer(){
  drawerOpen=true;
  document.getElementById('drawer').classList.add('open');
  document.getElementById('openBtn').classList.add('active');
}
function closeDrawer(){
  drawerOpen=false;
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('openBtn').classList.remove('active');
}
function swTab(name){
  ['search','queue','playlists'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('on', t===name);
    const pid = 'p'+t[0].toUpperCase()+t.slice(1);
    document.getElementById(pid).classList.toggle('on', t===name);
  });
}

// ╔══════════════════════════════════╗
//  GENRES
// ╚══════════════════════════════════╝
function initGenres(){
  const row = document.getElementById('genreRow');
  GENRES.forEach(g=>{
    const b = document.createElement('button');
    b.className='gbtn'; b.textContent=g.l;
    b.onclick = ()=>{ document.getElementById('sinput').value=g.q; doSearch(); };
    row.appendChild(b);
  });
}

// ╔══════════════════════════════════╗
//  SEARCH
// ╚══════════════════════════════════╝
async function doSearch(){
  const q = document.getElementById('sinput').value.trim();
  if(!q) return;
  setStat('<span class="spin"></span>検索中…','var(--dim)');
  document.getElementById('sgo').disabled = true;
  document.getElementById('rlist').innerHTML = '';
  try{
    const r = await fetch(`https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=20&q=${encodeURIComponent(q)}&key=${YT_KEY}`);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    if(d.error) throw new Error(d.error.message);
    results = (d.items||[]).filter(i=>i.id?.videoId).map(i=>({
      id:i.id.videoId, title:i.snippet.title,
      channel:i.snippet.channelTitle,
      thumb:i.snippet.thumbnails?.default?.url||''
    }));
    renderResults();
    setStat(results.length?`${results.length}件`:'結果なし','var(--acc3)');
  }catch(e){ setStat('⚠ '+e.message,'var(--acc2)'); }
  document.getElementById('sgo').disabled = false;
}

function renderResults(){
  const list = document.getElementById('rlist');
  if(!results.length){ list.innerHTML='<div class="empty">結果が見つかりません</div>'; return; }
  list.innerHTML='';
  results.forEach((item,i)=>{
    const inQ = queue.some(x=>x.id===item.id);
    const div = document.createElement('div');
    div.className = 'ri'+(queue[qi]?.id===item.id?' np':'');
    div.id = 'ri-'+item.id;
    div.innerHTML = `
      <img class="ri-thumb" src="${item.thumb}" alt="" loading="lazy">
      <div class="ri-info">
        <div class="ri-ttl">${esc(item.title)}</div>
        <div class="ri-ch">${esc(item.channel)}</div>
      </div>
      <div class="ri-act">
        <div class="ri-ibtn pl-btn" title="プレイリストに追加">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor" style="pointer-events:none">
            <rect x="1" y="3" width="14" height="2.5" rx="1.2"/><rect x="1" y="7.5" width="14" height="2.5" rx="1.2"/>
            <rect x="1" y="12" width="8" height="2.5" rx="1.2"/>
            <path d="M12 10.5v5.5l2-1.3 2 1.3v-5.5h-4z"/>
          </svg>
        </div>
        <div class="ri-ibtn add-btn" data-id="${item.id}">${inQ?'♪':'＋'}</div>
      </div>`;
    div.querySelector('.add-btn').addEventListener('click', e=>{e.stopPropagation(); addAndPlay(i);});
    div.querySelector('.pl-btn').addEventListener('click', e=>{e.stopPropagation(); showDrop(item, e.currentTarget);});
    div.addEventListener('click', ()=>addAndPlay(i));
    list.appendChild(div);
  });
}

// ╔══════════════════════════════════╗
//  PLAYBACK
// ╚══════════════════════════════════╝
function addAndPlay(idx){
  const item = results[idx];
  const ex = queue.findIndex(x=>x.id===item.id);
  if(ex!==-1) playIdx(ex);
  else{ queue.push(item); playIdx(queue.length-1); }
  refreshResultHighlights();
}

function playIdx(idx){
  if(idx<0||idx>=queue.length) return;
  qi=idx;
  updateBar();
  renderQueue();
  if(ytOk&&yt){ yt.loadVideoById(queue[idx].id); yt.playVideo(); }
}

function togglePP(){
  if(!yt||!ytOk) return;
  const s = yt.getPlayerState();
  if(s===YT.PlayerState.PLAYING) yt.pauseVideo();
  else if(s===YT.PlayerState.PAUSED) yt.playVideo();
  else if(queue.length) playIdx(qi>=0?qi:0);
}

function playNext(){
  if(!queue.length) return;
  let n;
  if(repeatOne) n=qi;
  else if(shuffle) n=Math.floor(Math.random()*queue.length);
  else{ n=qi+1; if(n>=queue.length) n=repeatAll?0:-1; }
  if(n>=0) playIdx(n);
  else{ qi=-1; updateBar(); setPlayBtn(false); }
}
function playPrev(){
  if(!queue.length) return;
  let p=qi-1; if(p<0) p=repeatAll?queue.length-1:0;
  playIdx(p);
}
function setVol(v){
  if(yt&&ytOk) yt.setVolume(+v);
  document.getElementById('vol').style.setProperty('--p',v+'%');
  localStorage.setItem('yt_vol',v);
}
function toggleMode(m){
  if(m==='shuffle') shuffle=!shuffle;
  if(m==='repeat'){  repeatAll=!repeatAll; if(repeatAll) repeatOne=false; }
  if(m==='repeat1'){ repeatOne=!repeatOne; if(repeatOne) repeatAll=false; }
  document.getElementById('mShuffle').classList.toggle('on',shuffle);
  document.getElementById('mRepeat').classList.toggle('on',repeatAll);
  document.getElementById('mRepeat1').classList.toggle('on',repeatOne);
}

// ╔══════════════════════════════════╗
//  QUEUE
// ╚══════════════════════════════════╝
function clearQueue(){
  if(yt&&ytOk) yt.stopVideo();
  queue=[]; qi=-1; playingPlId=null;
  renderQueue(); updateBar(); setPlayBtn(false);
  refreshResultHighlights();
}
function renderQueue(){
  const list = document.getElementById('qlist');
  if(!queue.length){ list.innerHTML='<div class="empty">キューが空です<br>SEARCH から追加しよう</div>'; updateQBadge(); return; }
  list.innerHTML='';
  queue.forEach((item,i)=>{
    const d = document.createElement('div');
    d.className = 'qi'+(i===qi?' nq':'');
    d.innerHTML = `<span class="qi-n">${i+1}</span><span class="qi-t">${esc(item.title)}</span><span class="qi-del" data-i="${i}">✕</span>`;
    d.onclick = e=>{
      if(e.target.classList.contains('qi-del')) removeQ(+e.target.dataset.i);
      else playIdx(i);
    };
    list.appendChild(d);
  });
  updateQBadge();
}
function removeQ(idx){
  if(idx===qi&&yt&&ytOk){ yt.stopVideo(); qi=-1; }
  else if(idx<qi) qi--;
  queue.splice(idx,1);
  renderQueue(); updateBar(); refreshResultHighlights();
}
function updateQBadge(){
  document.getElementById('qBadge').textContent = queue.length?`(${queue.length})`:'';
}
function refreshResultHighlights(){
  results.forEach(item=>{
    const el = document.getElementById('ri-'+item.id); if(!el) return;
    const inQ = queue.some(x=>x.id===item.id);
    const isNP = qi>=0 && queue[qi]?.id===item.id;
    el.classList.toggle('np', isNP);
    const btn = el.querySelector('.add-btn');
    if(btn) btn.textContent = inQ?'♪':'＋';
  });
}

// ╔══════════════════════════════════╗
//  BAR UPDATE
// ╚══════════════════════════════════╝
function updateBar(){
  if(qi>=0 && queue[qi]){
    const it = queue[qi];
    let plName = '';
    if(playingPlId){ const pl=getPl(playingPlId); if(pl&&pl.songs.some(s=>s.id===it.id)) plName=pl.name; else playingPlId=null; }
    document.getElementById('npLabel').textContent = plName ? `♪ ${plName}` : 'NOW PLAYING';
    document.getElementById('npTitle').textContent = it.title;
    document.getElementById('npSub').textContent   = it.channel;
    try{ localStorage.setItem('yt_nowplaying', JSON.stringify({title:it.title,channel:it.channel,id:it.id,playlist:plName})); }catch(e){}
  } else {
    document.getElementById('npLabel').textContent = 'MUSIC';
    document.getElementById('npTitle').textContent = '曲を選んでください';
    document.getElementById('npSub').textContent   = 'SEARCH または PLAYLIST から';
    try{ localStorage.removeItem('yt_nowplaying'); }catch(e){}
    playingPlId = null;
  }
}

// ╔══════════════════════════════════╗
//  PLAYLISTS — CRUD (localStorage first)
// ╚══════════════════════════════════╝
function newPlaylist(){
  showModal('新しいプレイリスト名を入力', '', name=>{
    if(!name) return; // empty after trim
    const pl = {
      id: Date.now()+'_'+Math.random().toString(36).slice(2,8),
      name, songs:[], createdAt:Date.now(), updatedAt:Date.now()
    };
    const arr = loadPls();
    arr.push(pl);
    savePls(arr);      // ← localStorage に即保存
    fbPush(pl);        // ← Firebase にもpush（失敗しても問題なし）
    renderPlList();    // ← 一覧を更新
    selPl = pl.id;
    showPlDetail(pl.id);
    swTab('playlists');
    openDrawer();
    toast(`「${pl.name}」を作成しました`);
  });
}

function renameCurPl(){
  const pl = getPl(selPl); if(!pl) return;
  showModal('名前を変更', pl.name, name=>{
    if(!name) return;
    const arr = loadPls();
    const idx = arr.findIndex(p=>p.id===pl.id); if(idx<0) return;
    arr[idx].name = name; arr[idx].updatedAt = Date.now();
    savePls(arr); fbPush(arr[idx]);
    document.getElementById('plDetailName').textContent = name;
    renderPlList();
    toast('名前を変更しました');
  });
}

function deleteCurPl(){
  const pl = getPl(selPl); if(!pl) return;
  if(!confirm(`「${pl.name}」を削除しますか？`)) return;
  const arr = loadPls().filter(p=>p.id!==pl.id);
  savePls(arr); fbRemove(pl.id);
  renderPlList();
  goPlList();
  toast('削除しました');
}

function addSongToPl(plId, song){
  const arr = loadPls();
  const pl = arr.find(p=>p.id===plId); if(!pl) return;
  if(pl.songs.some(s=>s.id===song.id)){ toast('既に追加されています'); return; }
  pl.songs.push({id:song.id,title:song.title,channel:song.channel||'',thumb:song.thumb||''});
  pl.updatedAt = Date.now();
  savePls(arr); fbPush(pl);
  if(selPl===plId) renderPlDetail(); // detail view を更新
  renderPlList();                      // 曲数を更新
  toast(`「${pl.name}」に追加しました`);
}

function removeSongFromPl(plId, songId){
  const arr = loadPls();
  const pl = arr.find(p=>p.id===plId); if(!pl) return;
  pl.songs = pl.songs.filter(s=>s.id!==songId);
  pl.updatedAt = Date.now();
  savePls(arr); fbPush(pl);
  renderPlDetail(); renderPlList();
}

function playCurrentPl(){
  const pl = getPl(selPl);
  if(!pl||!pl.songs.length){ toast('曲がありません'); return; }
  playingPlId = pl.id;
  queue=[...pl.songs]; qi=0;
  renderQueue(); playIdx(0);
  toast(`「${pl.name}」を再生中`);
}

function playFromPl(plId, idx){
  const pl = getPl(plId); if(!pl) return;
  playingPlId = plId;
  queue=[...pl.songs]; qi=idx;
  renderQueue(); playIdx(idx);
}

// ╔══════════════════════════════════╗
//  PLAYLISTS — NAVIGATION
// ╚══════════════════════════════════╝
function goPlList(){
  selPl = null;
  document.getElementById('plViewList').classList.remove('hidden');
  document.getElementById('plViewDetail').classList.remove('visible');
}
function showPlDetail(id){
  selPl = id;
  renderPlDetail();
  document.getElementById('plViewList').classList.add('hidden');
  document.getElementById('plViewDetail').classList.add('visible');
}

// ╔══════════════════════════════════╗
//  PLAYLISTS — RENDER
// ╚══════════════════════════════════╝
function renderPlList(){
  const pls = loadPls();
  document.getElementById('plBadge').textContent = pls.length?`(${pls.length})`:'';
  const list = document.getElementById('plList');
  if(!pls.length){
    list.innerHTML = '<div class="empty">プレイリストがありません<br>NEW で作成しよう</div>';
    return;
  }
  list.innerHTML='';
  pls.forEach(pl=>{
    const isPlaying = playingPlId===pl.id;
    const d = document.createElement('div');
    d.className = 'pl-item';
    d.innerHTML = `
      <span class="pl-item-icon">${isPlaying?'▶':'♫'}</span>
      <div class="pl-item-info">
        <div class="pl-item-name">${esc(pl.name)}</div>
        <div class="pl-item-cnt">${pl.songs.length}曲${isPlaying?' · 再生中':''}</div>
      </div>
      <span class="pl-arrow">›</span>`;
    d.onclick = ()=>showPlDetail(pl.id);
    list.appendChild(d);
  });
}

function renderPlDetail(){
  if(!selPl) return;
  const pl = getPl(selPl);
  if(!pl){ goPlList(); return; }
  document.getElementById('plDetailName').textContent = pl.name;
  const songs = document.getElementById('plDetailSongs');
  if(!pl.songs||!pl.songs.length){
    songs.innerHTML = '<div class="empty">曲がありません<br>SEARCH の + ボタンで追加</div>';
    return;
  }
  songs.innerHTML='';
  pl.songs.forEach((s,i)=>{
    const isNP = playingPlId===pl.id && qi>=0 && queue[qi]?.id===s.id;
    const d = document.createElement('div');
    d.className = 'ps'+(isNP?' np':'');
    d.innerHTML = `<span class="ps-n">${i+1}</span><span class="ps-t">${esc(s.title)}</span><span class="ps-del">✕</span>`;
    d.querySelector('.ps-del').onclick = e=>{ e.stopPropagation(); removeSongFromPl(pl.id, s.id); };
    d.onclick = e=>{ if(!e.target.classList.contains('ps-del')) playFromPl(pl.id, i); };
    songs.appendChild(d);
  });
}

// ╔══════════════════════════════════╗
//  DROPDOWN
// ╚══════════════════════════════════╝
function showDrop(song, anchor){
  const drop = document.getElementById('plDropdown');
  const items = document.getElementById('plDropItems');
  const pls = loadPls();
  items.innerHTML='';

  if(!pls.length){
    items.innerHTML = `
      <div class="pld-row none">プレイリストがありません</div>
      <div class="pld-row newpl" onclick="closeDrop();newPlaylist();">＋ 新規作成</div>`;
  } else {
    pls.forEach(pl=>{
      const done = pl.songs.some(s=>s.id===song.id);
      const d = document.createElement('div');
      d.className = 'pld-row'+(done?' done':'');
      d.innerHTML = `<span>${done?'✓ ':''}</span><span style="flex:1">${esc(pl.name)}</span><small style="color:var(--dim);font-size:10px;">${pl.songs.length}曲</small>`;
      d.onclick = ()=>{ if(!done){ addSongToPl(pl.id, song); } else { toast('既に追加済みです'); } closeDrop(); };
      items.appendChild(d);
    });
    const sep = document.createElement('div'); sep.style.cssText='height:1px;background:rgba(0,245,255,.08);margin:2px 0;'; items.appendChild(sep);
    const nd = document.createElement('div'); nd.className='pld-row newpl'; nd.innerHTML='<span>＋ 新規プレイリスト作成</span>';
    nd.onclick=()=>{ closeDrop(); newPlaylist(); };
    items.appendChild(nd);
  }

  // position
  drop.style.cssText='display:block;visibility:hidden;';
  requestAnimationFrame(()=>{
    const rect = anchor.getBoundingClientRect();
    const dw = drop.offsetWidth, dh = drop.offsetHeight;
    let left = rect.right - dw;
    if(left < 8) left = 8;
    if(left + dw > window.innerWidth - 8) left = window.innerWidth - dw - 8;
    let top = rect.top - dh - 8;
    if(top < 8) top = rect.bottom + 8;
    drop.style.cssText = `display:block;left:${left}px;top:${top}px;`;
    drop.classList.add('show');
  });
}
function closeDrop(){
  const d = document.getElementById('plDropdown');
  d.classList.remove('show');
  d.style.display='none';
}

// ╔══════════════════════════════════╗
//  MODAL — シンプルで確実な実装
// ╚══════════════════════════════════╝
function showModal(title, defaultVal, cb){
  modalCb = cb;
  document.getElementById('modalTitle').textContent = title;
  const inp = document.getElementById('modalInput');
  inp.value = defaultVal || '';
  document.getElementById('modal').classList.add('show');
  setTimeout(()=>{ inp.focus(); inp.select(); }, 80);
}

function modalOK(){
  const v = document.getElementById('modalInput').value.trim();
  const cb = modalCb;  // ← closeの前に必ず保存
  closeModal_();
  if(cb) cb(v);        // ← cbをcall
}
function modalCancel(){ closeModal_(); }
function closeModal_(){
  document.getElementById('modal').classList.remove('show');
  document.getElementById('modalInput').value = '';
  modalCb = null;
}

// Enter / Escape キー対応
document.getElementById('modalInput').addEventListener('keydown', e=>{
  if(e.key==='Enter')  modalOK();
  if(e.key==='Escape') modalCancel();
});

// ╔══════════════════════════════════╗
//  TOAST
// ╚══════════════════════════════════╝
let toastTimer = null;
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>t.classList.remove('show'), 2600);
}

// ╔══════════════════════════════════╗
//  UTILS
// ╚══════════════════════════════════╝
function setStat(h,c){ const e=document.getElementById('stat'); e.innerHTML=h; e.style.color=c||'var(--acc)'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

import('./config.js').then(cfg => {
  const vd = document.getElementById('versionDisp');
  if(vd) vd.textContent = `VER ${cfg.APP_VERSION}`;
});

// ページを離れる・閉じる際に yt_nowplaying をクリア（多用途: マルチ対戦への影響防止）
window.addEventListener('pagehide', () => {
  try { localStorage.removeItem('yt_nowplaying'); } catch(e) {}
});
