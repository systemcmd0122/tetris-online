<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TETRIS BATTLE — リアルタイム対戦</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700;900&display=swap');

    :root {
      --bg: #020408;
      --surface: #0a0f1a;
      --border: #1a2540;
      --accent: #00f5ff;
      --accent2: #ff0080;
      --accent3: #aaff00;
      --text: #e0f0ff;
      --dim: #4a6080;
      --red: #ff3355;
      --warn: #ffaa00;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Orbitron', monospace;
      min-height: 100vh;
      overflow-x: hidden
    }

    #bgCanvas {
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: .16;
      pointer-events: none
    }

    .scanlines-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.13) 2px, rgba(0, 0, 0, 0.13) 4px)
    }

    .screen {
      display: none;
      position: relative;
      z-index: 10
    }

    .screen.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px
    }

    /* Lobby */
    .logo {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(22px, 5vw, 46px);
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0, 245, 255, .5);
      letter-spacing: 8px;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 12px;
      color: var(--accent2);
      letter-spacing: 4px;
      margin-bottom: 44px;
      text-shadow: 0 0 20px rgba(255, 0, 128, .5)
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 32px;
      width: 100%;
      max-width: 440px;
      position: relative
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2))
    }

    .card-title {
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 3px;
      margin-bottom: 22px
    }

    .input-group {
      margin-bottom: 18px
    }

    .input-group label {
      display: block;
      font-size: 11px;
      color: var(--dim);
      letter-spacing: 2px;
      margin-bottom: 7px
    }

    input[type="text"] {
      width: 100%;
      background: rgba(0, 245, 255, .03);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      padding: 11px 14px;
      outline: none;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 2px;
      cursor: pointer;
      font-family: 'Orbitron', monospace;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: all .2s;
      margin-bottom: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #0080ff);
      color: #000
    }

    .btn-secondary {
      background: transparent;
      border: 1px solid var(--accent2);
      color: var(--accent2);
    }

    .btn-bot {
      background: linear-gradient(135deg, #7700ff, #cc00ff);
      color: #fff;
    }

    .btn-danger {
      background: transparent;
      border: 1px solid var(--red);
      color: var(--red);
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 18px 0;
      color: var(--dim);
      font-size: 11px;
      letter-spacing: 2px
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border)
    }

    /* Waiting Room */
    .room-code-display {
      text-align: center;
      padding: 16px;
      background: rgba(0, 245, 255, .05);
      border: 1px dashed var(--accent);
      border-radius: 2px;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .code-label { font-size: 10px; color: var(--dim); letter-spacing: 2px; }
    .code-val { font-family: 'Press Start 2P'; font-size: 24px; color: var(--accent); display: block; margin-top: 5px; }

    .player-slots {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    .slot {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      padding: 10px;
      text-align: center;
      border-radius: 2px;
      font-size: 11px;
    }
    .slot.active { border-color: var(--accent); color: var(--accent); }
    .slot.empty { color: var(--dim); border-style: dashed; }

    /* Game */
    #gameScreen { padding: 10px; justify-content: flex-start; }
    .game-layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      max-width: 100vw;
      overflow-x: auto;
      padding: 10px;
    }

    .my-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .opponents-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, 160px);
      gap: 15px;
      flex-grow: 1;
    }
    .opp-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 5px;
    }
    .opp-box canvas {
      border: 1px solid var(--accent2);
      width: 150px;
      height: 300px;
    }
    .opp-name { font-size: 10px; color: var(--dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; text-align: center; }

    .board-wrap { position: relative; }
    #myCanvas { border: 2px solid var(--accent); box-shadow: 0 0 20px rgba(0,245,255,0.2); }

    .side-info { display: flex; flex-direction: column; gap: 8px; width: 90px; }
    .info-box { background: var(--surface); border: 1px solid var(--border); padding: 8px; text-align: center; }
    .info-box-label { font-size: 8px; color: var(--dim); margin-bottom: 4px; }
    .info-box-val { font-family: 'Press Start 2P'; font-size: 10px; color: var(--accent3); }

    .action-popup {
      position: absolute; top: 20%; left: 50%; transform: translate(-50%, -50%);
      font-family: 'Press Start 2P'; font-size: 10px; color: var(--accent);
      text-shadow: 0 0 10px var(--accent); pointer-events: none; opacity: 0;
    }
    .action-popup.show { animation: popupAnim 1s ease-out forwards; }
    @keyframes popupAnim {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
      50% { opacity: 1; transform: translate(-50%, -100%) scale(1.2); }
      100% { opacity: 0; transform: translate(-50%, -150%) scale(1); }
    }

    /* Overlays */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: none; flex-direction: column; align-items: center; justify-content: center;
      z-index: 100; gap: 20px;
    }
    .overlay.show { display: flex; }
    .overlay-title { font-family: 'Press Start 2P'; font-size: 32px; color: var(--accent); text-align: center; }

    .countdown-num { font-family: 'Press Start 2P'; font-size: 100px; color: var(--accent); animation: countIn 0.5s ease-out; }
    @keyframes countIn { from { transform: scale(2); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    .toast {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      background: var(--surface); border: 1px solid var(--accent);
      padding: 10px 20px; border-radius: 4px; z-index: 1000; display: none;
    }

    .garbage-bar {
        position: absolute; left: -12px; bottom: 0; width: 8px;
        display: flex; flex-direction: column-reverse; gap: 2px;
    }
    .garb-cell { width: 8px; height: 16px; background: var(--red); border-radius: 1px; }

    .mobile-btns {
        display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px;
    }
    .m-btn {
        height: 50px; background: var(--surface); border: 1px solid var(--border);
        color: #fff; display: flex; align-items: center; justify-content: center; border-radius: 4px;
    }

    @media (max-width: 600px) {
        .mobile-btns { display: grid; }
    }
  </style>
</head>

<body>
  <canvas id="bgCanvas"></canvas>
  <div class="scanlines-overlay"></div>

  <!-- ══ LOBBY ══ -->
  <div class="screen active" id="lobbyScreen">
    <div class="logo">TETRIS</div>
    <div class="subtitle">BATTLE — REAL-TIME MULTIPLAYER</div>
    <div class="card">
      <div class="card-title">▶ PLAYER SETUP</div>
      <div class="input-group">
        <label>PLAYER NAME</label>
        <input type="text" id="playerName" placeholder="YOUR NAME" maxlength="12" value="PLAYER">
      </div>
      <button class="btn btn-primary" onclick="createRoom()">＋ CREATE ROOM (HOST)</button>
      <div class="divider">OR JOIN</div>
      <div class="input-group">
        <label>ROOM CODE</label>
        <input type="text" id="roomCodeInput" placeholder="4-DIGIT CODE" maxlength="4" style="text-align:center; letter-spacing:8px; font-size:20px;">
      </div>
      <button class="btn btn-secondary" onclick="joinRoom()">→ JOIN ROOM</button>
      <button class="btn btn-bot" onclick="startVsBot()">🤖 VS BOT (SOLO)</button>
      <a href="index.html" class="btn btn-danger" style="text-decoration:none; text-align:center; display:block; margin-top:10px;">← BACK TO MENU</a>
    </div>
  </div>

  <!-- ══ WAITING ══ -->
  <div class="screen" id="waitingScreen">
    <div class="logo" style="font-size:24px;">WAITING ROOM</div>
    <div class="card">
      <div class="room-code-display" onclick="copyRoomCode()">
        <span class="code-label">SHARE THIS CODE</span>
        <span class="code-val" id="displayRoomCode">----</span>
      </div>
      <div class="player-slots" id="playerSlots">
        <div class="slot empty">P1: EMPTY</div>
        <div class="slot empty">P2: EMPTY</div>
        <div class="slot empty">P3: EMPTY</div>
        <div class="slot empty">P4: EMPTY</div>
      </div>
      <div id="hostControls" style="display:none">
        <button class="btn btn-primary" id="startBtn" onclick="hostStart()">START MATCH</button>
      </div>
      <div id="guestMsg" style="text-align:center; font-size:11px; color:var(--dim);">
        WAITING FOR HOST TO START...
      </div>
      <button class="btn btn-danger" style="margin-top:10px;" onclick="leaveRoom()">LEAVE ROOM</button>
    </div>
  </div>

  <!-- ══ GAME ══ -->
  <div class="screen" id="gameScreen">
    <div class="game-layout">
      <!-- MY BOARD -->
      <div class="my-section">
        <div id="myNameTag" style="font-size:12px; color:var(--accent); font-weight:bold;">PLAYER</div>
        <div style="display:flex; gap:10px;">
          <div class="side-info">
            <div class="info-box">
              <div class="info-box-label">HOLD</div>
              <canvas id="holdCanvas" width="80" height="80"></canvas>
            </div>
            <div class="info-box">
              <div class="info-box-label">SCORE</div>
              <div class="info-box-val" id="scoreDisplay">0</div>
            </div>
          </div>
          <div class="board-wrap">
            <div class="garbage-bar" id="garbBar"></div>
            <canvas id="myCanvas" width="200" height="400"></canvas>
            <div class="action-popup" id="actionPopup"></div>
          </div>
          <div class="side-info">
            <div class="info-box">
              <div class="info-box-label">NEXT</div>
              <canvas id="nextCanvas" width="80" height="80"></canvas>
            </div>
            <div class="info-box">
              <div class="info-box-label">LINES</div>
              <div class="info-box-val" id="linesDisplay">0</div>
            </div>
          </div>
        </div>
        <div class="mobile-btns">
            <div class="m-btn" id="m-left">←</div>
            <div class="m-btn" id="m-rotate">↻</div>
            <div class="m-btn" id="m-right">→</div>
            <div class="m-btn" id="m-soft">↓</div>
            <div class="m-btn" id="m-hard">▼</div>
            <div class="m-btn" id="m-hold">C</div>
        </div>
      </div>

      <!-- OPPONENT BOARDS -->
      <div class="opponents-grid" id="opponentsGrid">
          <!-- Dynamically added -->
      </div>
    </div>
    <button class="btn btn-danger" style="width:auto; padding:5px 15px; margin-top:20px;" onclick="leaveRoom()">QUIT</button>
  </div>

  <!-- ══ COUNTDOWN ══ -->
  <div class="overlay" id="countdownOverlay">
    <div class="countdown-num" id="countdownNum">3</div>
  </div>

  <!-- ══ RESULT ══ -->
  <div class="overlay" id="resultOverlay">
    <div class="overlay-title" id="resultTitle">WINNER!</div>
    <div id="resultStats" style="text-align:center; line-height:2;"></div>
    <button class="btn btn-primary" style="width:200px; margin-top:20px;" onclick="leaveRoom()">LOBBY</button>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, off, update, remove, onDisconnect, runTransaction }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    import { FIREBASE_CONFIG, GAME_CONFIG, ROOM_CONFIG, APP_VERSION } from './config.js';
    import { TetrisGame, BotController, makePiece } from './tetris-engine.js';

    const app = initializeApp(FIREBASE_CONFIG);
    const db = getDatabase(app);

    let roomCode = null;
    let myRole = null;
    let game = null;
    let gameRunning = false;
    let serverTimeOffset = 0;
    let listeners = [];
    let isBotMode = false;
    let botGame = null;
    let botCtrl = null;

    onValue(ref(db, ".info/serverTimeOffset"), s => serverTimeOffset = s.val() || 0);
    const getServerTime = () => Date.now() + serverTimeOffset;

    window.createRoom = async () => {
      const name = document.getElementById('playerName').value.trim() || 'HOST';
      roomCode = Math.floor(1000 + Math.random() * 9000).toString();
      const rRef = ref(db, `rooms/${roomCode}`);
      await set(rRef, { status: 'waiting', p1: { name, active: true }, createdAt: getServerTime() });
      onDisconnect(rRef).remove();
      myRole = 'p1';
      showScreen('waitingScreen');
      setupRoomListener();
    };

    window.joinRoom = async () => {
      const code = document.getElementById('roomCodeInput').value.trim();
      const name = document.getElementById('playerName').value.trim() || 'PLAYER';
      if (code.length !== 4) return showToast("Enter 4-digit code");

      const rRef = ref(db, `rooms/${code}`);
      const res = await runTransaction(rRef, (data) => {
        if (!data || data.status !== 'waiting') return;
        const slots = ['p2', 'p3', 'p4'];
        for (let s of slots) { if (!data[s]) { data[s] = { name, active: true }; return data; } }
        return;
      });

      if (res.committed) {
        roomCode = code;
        const data = res.snapshot.val();
        if (data.p2?.name === name) myRole = 'p2';
        else if (data.p3?.name === name) myRole = 'p3';
        else if (data.p4?.name === name) myRole = 'p4';
        onDisconnect(ref(db, `rooms/${roomCode}/${myRole}`)).remove();
        showScreen('waitingScreen');
        setupRoomListener();
      } else showToast("Room full or not found");
    };

    window.startVsBot = () => {
        isBotMode = true;
        showScreen('gameScreen');
        document.getElementById('myNameTag').textContent = "YOU vs BOT";
        document.getElementById('opponentsGrid').innerHTML = '';
        const box = document.createElement('div');
        box.className = 'opp-box';
        box.innerHTML = `<div class="opp-name">BOT (HARD)</div><canvas id="botCanvas" width="150" height="300"></canvas>`;
        document.getElementById('opponentsGrid').appendChild(box);

        game = new TetrisGame('myCanvas', 'holdCanvas', 'nextCanvas', { onSound: playSound });
        botGame = new TetrisGame('botCanvas', null, null);
        botCtrl = new BotController(botGame, 3);
        gameRunning = true;
        requestAnimationFrame(gameLoop);
    };

    function setupRoomListener() {
      document.getElementById('displayRoomCode').textContent = roomCode;
      const rRef = ref(db, `rooms/${roomCode}`);
      const l = onValue(rRef, (snap) => {
        const d = snap.val();
        if (!d) { if (gameRunning) leaveRoom(); return; }
        updateWaitingUI(d);
        if (d.status === 'ready' && !gameRunning) startMatch(d.startTime);
      });
      listeners.push({ref: rRef, fn: l});
    }

    function updateWaitingUI(d) {
      const slots = ['p1', 'p2', 'p3', 'p4'];
      const container = document.getElementById('playerSlots');
      container.innerHTML = '';
      let count = 0;
      slots.forEach(s => {
        const div = document.createElement('div');
        if (d[s]) {
            count++;
            div.className = 'slot active' + (s === myRole ? ' me' : '');
            div.textContent = `${s.toUpperCase()}: ${d[s].name}`;
        } else {
            div.className = 'slot empty';
            div.textContent = `${s.toUpperCase()}: EMPTY`;
        }
        container.appendChild(div);
      });
      document.getElementById('hostControls').style.display = (myRole === 'p1' ? 'block' : 'none');
      document.getElementById('startBtn').disabled = (count < 2);
    }

    window.hostStart = () => {
      update(ref(db, `rooms/${roomCode}`), { status: 'ready', startTime: getServerTime() + 3000 });
    };

    function startMatch(startTime) {
      showScreen('gameScreen');
      gameRunning = true;
      const ov = document.getElementById('countdownOverlay');
      const num = document.getElementById('countdownNum');
      ov.classList.add('show');

      const iv = setInterval(() => {
        const diff = Math.ceil((startTime - getServerTime()) / 1000);
        if (diff > 0) num.textContent = diff;
        else {
          num.textContent = "GO!";
          clearInterval(iv);
          setTimeout(() => { ov.classList.remove('show'); initGame(); }, 500);
        }
      }, 100);
    }

    function initGame() {
      game = new TetrisGame('myCanvas', 'holdCanvas', 'nextCanvas', { onSound: playSound });
      document.getElementById('opponentsGrid').innerHTML = '';

      const slots = ['p1', 'p2', 'p3', 'p4'].filter(s => s !== myRole);
      slots.forEach(s => {
        const oRef = ref(db, `rooms/${roomCode}/game/${s}`);
        const l = onValue(oRef, snap => {
          const d = snap.val();
          if (d) updateOppBoard(s, d);
        });
        listeners.push({ref: oRef, fn: l});
      });

      const gRef = ref(db, `rooms/${roomCode}/garb/${myRole}`);
      const gl = onValue(gRef, snap => {
        const lines = snap.val();
        if (lines > 0) { game.pendingGarbage += lines; set(gRef, 0); playSound('attack'); }
      });
      listeners.push({ref: gRef, fn: gl});

      requestAnimationFrame(gameLoop);
    }

    let lastSync = 0;
    function gameLoop(ts) {
      if (!gameRunning) return;
      game.update(ts);
      game.draw();

      if (isBotMode) {
          botCtrl.tick(ts);
          botGame.update(ts);
          botGame.draw();
          while (game.results.length > 0) {
              const r = game.results.shift();
              if (r.garbageOut > 0) botGame.pendingGarbage += r.garbageOut;
              if (r.actionLabel) showAction(r.actionLabel);
          }
          while (botGame.results.length > 0) {
              const r = botGame.results.shift();
              if (r.garbageOut > 0) { game.pendingGarbage += r.garbageOut; playSound('attack'); }
          }
          if (game.gameOver) showResult("LOSE");
          else if (botGame.gameOver) showResult("WIN!");
      } else {
        if (ts - lastSync > 100) { lastSync = ts; set(ref(db, `rooms/${roomCode}/game/${myRole}`), game.serialize()); }
        while (game.results.length > 0) {
          const r = game.results.shift();
          if (r.garbageOut > 0) sendAttack(r.garbageOut);
          if (r.actionLabel) showAction(r.actionLabel);
        }
        if (game.gameOver) checkEnd();
      }

      updateUI();
      requestAnimationFrame(gameLoop);
    }

    async function sendAttack(lines) {
      const snap = await get(ref(db, `rooms/${roomCode}`));
      const d = snap.val();
      const opps = ['p1', 'p2', 'p3', 'p4'].filter(s => s !== myRole && d[s] && !d.game?.[s]?.gameOver);
      if (opps.length > 0) {
        const target = opps[Math.floor(Math.random() * opps.length)];
        runTransaction(ref(db, `rooms/${roomCode}/garb/${target}`), c => (c || 0) + lines);
      }
    }

    function updateOppBoard(slot, d) {
      let box = document.getElementById(`opp-${slot}`);
      if (!box) {
        box = document.createElement('div'); box.id = `opp-${slot}`; box.className = 'opp-box';
        box.innerHTML = `<div class="opp-name" id="name-${slot}">${slot}</div><canvas id="cvs-${slot}" width="150" height="300"></canvas>`;
        document.getElementById('opponentsGrid').appendChild(box);
        get(ref(db, `rooms/${roomCode}/${slot}/name`)).then(s => { if (s.exists()) document.getElementById(`name-${slot}`).textContent = s.val(); });
      }
      TetrisGame.drawOpponent(document.getElementById(`cvs-${slot}`), d);
      if (d.gameOver) checkEnd();
    }

    async function checkEnd() {
      const snap = await get(ref(db, `rooms/${roomCode}`));
      const d = snap.val();
      const slots = ['p1', 'p2', 'p3', 'p4'].filter(s => d[s]);
      const alive = slots.filter(s => !d.game?.[s]?.gameOver);
      if (alive.length <= 1) {
          const win = alive[0] === myRole;
          showResult(win ? "WINNER!" : "GAME OVER");
      }
    }

    function updateUI() {
      document.getElementById('scoreDisplay').textContent = game.score;
      document.getElementById('linesDisplay').textContent = game.lines;
      const gb = document.getElementById('garbBar');
      gb.innerHTML = '';
      for (let i = 0; i < Math.min(game.pendingGarbage, 20); i++) {
          const c = document.createElement('div'); c.className = 'garb-cell';
          gb.appendChild(c);
      }
    }

    function showAction(txt) {
      const p = document.getElementById('actionPopup');
      p.textContent = txt.replace('\n', ' ');
      p.classList.remove('show'); void p.offsetWidth; p.classList.add('show');
    }

    function showResult(title) {
      gameRunning = false;
      document.getElementById('resultTitle').textContent = title;
      document.getElementById('resultStats').innerHTML = `SCORE: ${game.score}<br>LINES: ${game.lines}`;
      document.getElementById('resultOverlay').classList.add('show');
      if (title === "WINNER!") playSound('win');
    }

    window.leaveRoom = async () => {
      gameRunning = false;
      listeners.forEach(l => off(l.ref, 'value', l.fn));
      if (roomCode) {
          await remove(ref(db, `rooms/${roomCode}/${myRole}`));
          if (myRole === 'p1') await remove(ref(db, `rooms/${roomCode}`));
      }
      location.reload();
    };

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function showToast(msg) {
      const t = document.getElementById('toast'); t.textContent = msg;
      t.style.display = 'block'; setTimeout(() => t.style.display = 'none', 3000);
    }

    window.copyRoomCode = () => { navigator.clipboard.writeText(roomCode); showToast("Copied!"); };

    function playSound(type) {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      const now = ctx.currentTime;
      if (type === 'move') osc.frequency.setValueAtTime(200, now);
      else if (type === 'rotate') osc.frequency.setValueAtTime(400, now);
      else if (type === 'lock') osc.frequency.setValueAtTime(150, now);
      else if (type === 'clear1') osc.frequency.setValueAtTime(600, now);
      else if (type === 'tetris') osc.frequency.setValueAtTime(800, now);
      else if (type === 'attack') osc.frequency.setValueAtTime(100, now);
      else if (type === 'win') {
          [440, 554, 659, 880].forEach((f, i) => {
              const o2 = ctx.createOscillator(), g2 = ctx.createGain();
              o2.connect(g2); g2.connect(ctx.destination);
              o2.frequency.setValueAtTime(f, now + i * 0.1);
              g2.gain.setValueAtTime(0.1, now + i * 0.1);
              g2.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.2);
              o2.start(now + i * 0.1); o2.stop(now + i * 0.1 + 0.2);
          });
          return;
      }
      g.gain.setValueAtTime(0.05, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
      osc.start(now); osc.stop(now + 0.1);
    }

    const keys = new Set();
    document.addEventListener('keydown', e => {
      if (!gameRunning || !game) return;
      if (keys.has(e.code)) return; keys.add(e.code);
      switch(e.code) {
        case 'ArrowLeft': game.move(-1); break;
        case 'ArrowRight': game.move(1); break;
        case 'ArrowUp': case 'KeyX': game.rotate(1); break;
        case 'KeyZ': game.rotate(-1); break;
        case 'Space': game.hardDrop(); break;
        case 'KeyC': case 'ShiftLeft': case 'ShiftRight': game.hold(); break;
      }
    });
    document.addEventListener('keyup', e => keys.delete(e.code));
    let sdIv = null;
    document.addEventListener('keydown', e => {
        if (e.code === 'ArrowDown' && !sdIv && gameRunning) { game.softDrop(); sdIv = setInterval(() => game.softDrop(), 50); }
    });
    document.addEventListener('keyup', e => { if (e.code === 'ArrowDown') { clearInterval(sdIv); sdIv = null; } });

    // Mobile
    const setupM = (id, fn, iv = null) => {
      const el = document.getElementById(id); let t = null;
      const start = e => { e.preventDefault(); if (!gameRunning) return; fn(); if (iv) t = setInterval(fn, iv); };
      const stop = () => { clearInterval(t); t = null; };
      el.addEventListener('touchstart', start); el.addEventListener('touchend', stop);
    };
    setupM('m-left', () => game.move(-1), 100); setupM('m-right', () => game.move(1), 100);
    setupM('m-soft', () => game.softDrop(), 50); setupM('m-rotate', () => game.rotate(1));
    setupM('m-hard', () => game.hardDrop()); setupM('m-hold', () => game.hold());

    // BG
    (function () {
      const cvs = document.getElementById('bgCanvas'), ctx = cvs.getContext('2d');
      let W, H; function res() { W = cvs.width = window.innerWidth; H = cvs.height = window.innerHeight; }
      res(); window.addEventListener('resize', res);
      function frame() {
        ctx.clearRect(0, 0, W, H); ctx.strokeStyle = 'rgba(0, 245, 255, 0.05)';
        for (let x = 0; x < W; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
        for (let y = 0; y < H; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
        requestAnimationFrame(frame);
      }
      frame();
    })();
  </script>
</body>
</html>
